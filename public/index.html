<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>STARSPHERE ONLINE</title>
<style>
:root{
  --cy:#19e3ff; --cyd:rgba(25,227,255,.22);
  --am:#ffb53e; --amd:rgba(255,181,62,.2);
  --rd:#ff4055;
  --ink:#dcecf5; --dim:#7e96a8;
  --glass:rgba(10,16,28,.62);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  background:#04070e;color:var(--ink);
  font-family:"Segoe UI",system-ui,Arial,sans-serif;
  font-variant-numeric:tabular-nums;
  overflow:hidden;
}
#stars{position:fixed;inset:0;z-index:0;}
#app{position:relative;z-index:1;display:flex;height:100vh;}
/* ---- nav rail ---- */
#rail{
  width:200px;min-width:200px;display:flex;flex-direction:column;gap:4px;
  padding:18px 12px;background:rgba(6,10,18,.75);backdrop-filter:blur(12px);
  border-right:1px solid var(--cyd);
}
#rail .logo{font-size:17px;font-weight:700;letter-spacing:3px;color:var(--cy);
  text-shadow:0 0 12px var(--cyd);margin-bottom:14px;}
#rail .logo small{display:block;color:var(--dim);font-size:9px;letter-spacing:2px;font-weight:400;}
.navbtn{
  display:flex;justify-content:space-between;align-items:center;
  padding:9px 12px;border-radius:9px;cursor:pointer;color:var(--ink);
  border:1px solid transparent;font-size:13px;letter-spacing:.5px;
  transition:all .18s ease;background:none;text-align:left;width:100%;
}
.navbtn:hover{background:rgba(25,227,255,.07);}
.navbtn.on{background:rgba(25,227,255,.12);border-color:var(--cyd);color:var(--cy);
  box-shadow:0 0 14px rgba(25,227,255,.12) inset;}
.navbtn.stub{color:#46596a;cursor:default;}
.navbtn.stub:hover{background:none;}
.navbtn .ph{font-size:8px;color:#3a4c5c;border:1px solid #233240;border-radius:4px;padding:1px 4px;}
#railfoot{margin-top:auto;font-size:10px;color:var(--dim);line-height:1.7;}
/* ---- main ---- */
#main{flex:1;display:flex;flex-direction:column;min-width:0;}
#topbar{
  display:flex;align-items:center;gap:22px;padding:10px 22px;
  background:rgba(6,10,18,.6);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--cyd);font-size:12px;color:var(--dim);
}
#topbar b{color:var(--ink);font-weight:600;}
#topbar .clock{color:var(--cy);font-weight:700;}
#screen{flex:1;overflow-y:auto;padding:22px;}
/* ---- panels ---- */
.panel{
  background:var(--glass);backdrop-filter:blur(10px);
  border:1px solid var(--cyd);border-radius:14px;
  padding:16px 18px;box-shadow:0 0 24px rgba(0,0,0,.35);
}
.panel h2{font-size:12px;letter-spacing:2.5px;color:var(--cy);font-weight:600;
  text-transform:uppercase;margin-bottom:12px;}
.grid{display:grid;gap:14px;}
.g3{grid-template-columns:repeat(3,1fr);}
.g2{grid-template-columns:repeat(2,1fr);}
.row{display:flex;gap:14px;align-items:stretch;}
.muted{color:var(--dim);font-size:11px;}
.amber{color:var(--am);} .cyan{color:var(--cy);} .red{color:var(--rd);}
.big{font-size:26px;font-weight:700;}
.mt{margin-top:14px;}
/* ---- resource cards ---- */
.rescard{position:relative;overflow:hidden;}
.rescard .delta{font-size:11px;color:var(--am);}
.rescard .roidn{position:absolute;top:14px;right:16px;font-size:11px;color:var(--dim);}
/* ---- buttons ---- */
button.act{
  background:rgba(25,227,255,.1);border:1px solid var(--cyd);color:var(--cy);
  border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer;
  letter-spacing:.5px;transition:all .15s;font-family:inherit;
}
button.act:hover:not(:disabled){background:rgba(25,227,255,.22);box-shadow:0 0 12px var(--cyd);}
button.act:disabled{opacity:.32;cursor:default;}
button.act.warn{border-color:rgba(255,64,85,.4);color:var(--rd);background:rgba(255,64,85,.08);}
button.act.amber{border-color:rgba(255,181,62,.4);color:var(--am);background:rgba(255,181,62,.08);}
/* ---- rings ---- */
.ringwrap{display:flex;align-items:center;gap:14px;}
.ring{transform:rotate(-90deg);}
.ring .bgc{stroke:rgba(255,255,255,.07);fill:none;}
.ring .fgc{stroke:var(--cy);fill:none;stroke-linecap:round;
  filter:drop-shadow(0 0 4px var(--cy));transition:stroke-dashoffset .4s;}
.ring.amber .fgc{stroke:var(--am);filter:drop-shadow(0 0 4px var(--am));}
/* ---- building cards ---- */
.bcard{display:flex;flex-direction:column;gap:7px;}
.bcard .lvl{display:flex;gap:3px;}
.bcard .pip{width:9px;height:9px;border-radius:2px;background:rgba(255,255,255,.08);}
.bcard .pip.on{background:var(--cy);box-shadow:0 0 6px var(--cy);}
.bcard .pip.q{background:var(--am);opacity:.65;}
.cost{font-size:11px;color:var(--dim);}
.cost b{color:var(--ink);font-weight:600;}
.cost .no{color:var(--rd);}
/* ---- research ---- */
.branches{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;}
.rung{
  border:1px solid rgba(255,255,255,.09);border-radius:10px;padding:9px 11px;
  margin-bottom:8px;font-size:11.5px;position:relative;transition:all .15s;
}
.rung.done{border-color:var(--cyd);background:rgba(25,227,255,.07);}
.rung.done .rname{color:var(--cy);}
.rung.avail{cursor:pointer;border-color:rgba(255,181,62,.45);}
.rung.avail:hover{background:var(--amd);box-shadow:0 0 12px var(--amd);}
.rung.queueable{cursor:pointer;border-color:rgba(184,138,232,.4);}
.rung.queueable:hover{background:rgba(184,138,232,.12);}
.rung.queued{border-color:#b88ae8;background:rgba(184,138,232,.12);}
.qchip{display:inline-flex;align-items:center;gap:7px;padding:4px 6px 4px 12px;
  border:1px solid rgba(184,138,232,.45);border-radius:999px;font-size:11.5px;
  color:#cdb0ee;background:rgba(184,138,232,.08);}
.qchip .x{cursor:pointer;color:rgba(184,138,232,.55);border-radius:50%;
  width:17px;height:17px;display:inline-flex;align-items:center;justify-content:center;
  font-size:10px;transition:all .12s;}
.qchip .x:hover{color:#fff;background:var(--rd);}
body.y2k .qchip{border-radius:0;color:#5c0f8b;border-color:#999;background:#fff;}
.rung.cur{border-color:var(--am);background:var(--amd);}
.rung.lock{opacity:.38;}
.rname{font-weight:600;font-size:12px;}
.branchhead{font-size:11px;letter-spacing:2px;color:var(--cy);margin-bottom:8px;text-transform:uppercase;}
/* ---- events ---- */
.ev{display:flex;gap:10px;padding:7px 4px;border-bottom:1px solid rgba(255,255,255,.05);font-size:12px;}
.ev .tk{color:var(--dim);min-width:62px;font-size:11px;}
.ev.kind-build .tx{color:var(--ink);}
.ev.kind-research .tx{color:var(--cy);}
.ev.kind-roid .tx{color:var(--am);}
.ev.kind-round .tx{color:var(--rd);font-weight:600;}
.ev.kind-intel .tx{color:#b88ae8;}
.ev.kind-battle .tx{color:var(--ink);}
.ev.kind-incoming .tx{color:var(--rd);font-weight:600;}
.evclick{cursor:pointer;transition:background .12s;}
.evclick:hover{background:rgba(25,227,255,.07);}
.evclick .tx{text-decoration:underline dotted rgba(126,150,168,.55);text-underline-offset:3px;}
/* ---- queue ---- */
.qitem{display:flex;justify-content:space-between;align-items:center;
  padding:8px 10px;border:1px solid rgba(255,255,255,.08);border-radius:9px;margin-bottom:8px;font-size:12px;}
/* ---- modal ---- */
#modal{position:fixed;inset:0;background:rgba(2,5,10,.78);z-index:50;
  display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);}
#modal .panel{max-width:520px;width:90%;max-height:80vh;overflow-y:auto;}
.hidden{display:none !important;}
/* ---- setup ---- */
.faccard{cursor:pointer;border:1px solid rgba(255,255,255,.1);border-radius:12px;
  padding:13px;transition:all .15s;font-size:12px;}
.faccard:hover{border-color:var(--cyd);}
.faccard.sel{border-color:var(--cy);background:rgba(25,227,255,.09);box-shadow:0 0 16px var(--cyd);}
.faccard b{display:block;font-size:14px;margin-bottom:4px;}
input[type=text],input[type=password],textarea{
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);
  color:var(--ink);border-radius:8px;padding:9px 12px;font-size:13px;width:100%;
  font-family:inherit;
}
textarea{font-family:monospace;font-size:10px;height:90px;}
input:focus,textarea:focus{outline:none;border-color:var(--cy);}
label.radio{display:flex;gap:8px;align-items:center;font-size:12.5px;padding:6px 0;cursor:pointer;}
::-webkit-scrollbar{width:9px;} ::-webkit-scrollbar-thumb{background:rgba(25,227,255,.18);border-radius:5px;}
.roundbar{height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;}
.roundbar i{display:block;height:100%;background:linear-gradient(90deg,var(--cy),var(--am));}
#umap{width:100%;height:340px;display:block;border-radius:10px;cursor:pointer;background:rgba(2,4,10,.5);}
#sgraph{width:100%;height:140px;display:block;}
/* ---- the CLASSIC STARSPHERE skin ----
   faithful to the original 2001-2006 starsphere.net look:
   navy page (#161d25), blue-grey rail (#24323f), azure section
   bars (#058db7), Verdana 11px, orange date stamps, square corners */
body.y2k{
  --cy:#36c6f0; --cyd:#2c3e4e;
  --am:#f5a430; --amd:rgba(245,164,48,.15);
  --rd:#ff5a5a;
  --ink:#d7dde3; --dim:#8fa9bd;
  --glass:#1b242e;
  background:#161d25;color:#d7dde3;
  font-family:Verdana,Tahoma,"DejaVu Sans",sans-serif;font-size:11px;
}
body.y2k #stars{opacity:.55;}
body.y2k .panel{background:#1b242e;border:1px solid #2c3e4e;border-radius:0;box-shadow:none;backdrop-filter:none;}
body.y2k .panel h2{
  background:linear-gradient(180deg,#0fa6d8,#047da6);color:#fff;
  font-family:inherit;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:none;
  margin:-16px -18px 12px;padding:5px 10px;border-bottom:1px solid #033e52;
}
body.y2k #rail{background:#24323f;border-right:1px solid #0c151d;backdrop-filter:none;counter-reset:nav;}
body.y2k #rail .logo{color:#fff;text-shadow:0 1px 0 #000;font-style:italic;letter-spacing:2px;}
body.y2k #rail .logo small{color:#8fa9bd;font-style:normal;}
body.y2k #rail > div[style]{border-color:#2c3e4e !important;}
body.y2k .navbtn{
  color:#fff;border-radius:0;font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:1px;justify-content:flex-end;gap:8px;padding:6px 10px;transition:none;
}
body.y2k .navbtn::before{
  counter-increment:nav;content:counter(nav,decimal-leading-zero);
  margin-right:auto;color:#42586c;font-size:9px;font-weight:400;letter-spacing:0;
}
body.y2k .navbtn:hover{background:#2e4150;color:#7fd4ff;}
body.y2k .navbtn.on{background:#0c87b4;border-color:transparent;color:#fff;box-shadow:none;}
body.y2k #topbar{background:#0e1822;border-bottom:1px solid #2c3e4e;color:#8fa9bd;backdrop-filter:none;font-size:11px;}
body.y2k #topbar b{color:#fff;}
body.y2k #topbar .clock{color:#36c6f0;}
body.y2k .cyan{color:#36c6f0;} body.y2k .amber{color:#f5a430;} body.y2k .red{color:#ff5a5a;}
body.y2k .muted{color:#8fa9bd;}
body.y2k .ev{border-bottom:1px solid #232f3a;}
body.y2k .ev .tk{color:#f5a430;} /* orange date stamps, like the news feed */
body.y2k button.act{
  background:linear-gradient(180deg,#2e4150,#24323f);border:1px solid #3b5468;
  color:#cfe9f7;border-radius:0;transition:none;font-family:inherit;font-size:11px;
}
body.y2k button.act:hover:not(:disabled){border-color:#36c6f0;background:#2e4150;box-shadow:none;color:#fff;}
body.y2k button.act.warn{border-color:#7a3b44;color:#ff8a95;background:linear-gradient(180deg,#3a2730,#2c1f26);}
body.y2k button.act.amber{border-color:#7a5f30;color:#f5a430;background:linear-gradient(180deg,#3a3122,#2c2519);}
body.y2k input[type=text],body.y2k textarea{background:#0e151c;border:1px solid #3b5468;color:#d7dde3;border-radius:0;}
body.y2k input:focus,body.y2k textarea:focus{border-color:#36c6f0;}
body.y2k .qitem,body.y2k .rung,body.y2k .faccard{border-radius:0;border-color:#2c3e4e;}
body.y2k .qchip{border-radius:0;}
body.y2k .rung.done{background:#11303d;border-color:#0c87b4;}
body.y2k .rung.done .rname{color:#36c6f0;}
body.y2k .rung.avail{border-color:#7a5f30;}
body.y2k .rung.avail:hover{background:#2c2519;box-shadow:none;}
body.y2k .rung.cur{border-color:#f5a430;background:#2c2519;}
body.y2k .pip{background:#22303c;}
body.y2k .pip.on{background:#36c6f0;box-shadow:none;}
body.y2k .ring .fgc{stroke:#36c6f0;filter:none;}
body.y2k .ring.amber .fgc{stroke:#f5a430;}
body.y2k .roundbar{background:#0e151c;border-radius:0;}
body.y2k .roundbar i{background:linear-gradient(90deg,#058db7,#36c6f0);}
body.y2k #umap{background:#0c121a;border:1px solid #2c3e4e;border-radius:0;}
body.y2k ::-webkit-scrollbar-thumb{background:#3b5468;border-radius:0;}
body.y2k .big{font-size:20px;}

/* ---- mobile (the rail becomes a scrollable top nav) ---- */
@media (max-width: 760px){
  html,body{height:100vh;height:100dvh;}
  #app{flex-direction:column;height:100vh;height:100dvh;}
  #rail{
    width:100%;min-width:0;flex:none;flex-direction:row;align-items:center;gap:6px;
    padding:8px 10px;overflow-x:auto;overflow-y:hidden;
    border-right:none;border-bottom:1px solid var(--cyd);
    -webkit-overflow-scrolling:touch;scrollbar-width:none;
  }
  #rail::-webkit-scrollbar{display:none;}
  #rail .logo{display:none;}
  #rail > div{display:none;}
  /* column flexbox: without min-height:0 the content pane sizes to its
     content and the inner scroll never engages — the no-scroll bug */
  #main{min-height:0;flex:1 1 0;}
  #screen{min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .navbtn{width:auto;flex:none;padding:9px 13px;font-size:13px;white-space:nowrap;}
  #topbar{flex-wrap:wrap;gap:6px 14px;padding:8px 12px;font-size:11.5px;row-gap:4px;}
  #topbar > span[style*="margin-left:auto"]{display:none;}
  #screen{padding:12px;padding-bottom:32px;}
  .g3,.g2{grid-template-columns:1fr;}
  .row{flex-wrap:wrap;}
  .branches{grid-template-columns:1fr;gap:10px;}
  .qitem{flex-wrap:wrap;gap:6px;row-gap:8px;}
  button.act{padding:11px 15px;font-size:13px;}
  input[type=text],input[type=password],textarea{font-size:16px;padding:11px 12px;}
  .big{font-size:22px;}
  .branchhead{margin-top:6px;}
  #modal .panel{width:96%;max-height:88vh;max-height:88dvh;}
  #umap{height:260px;}
  #sgraph{height:120px;}
}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div id="app">
  <nav id="rail"></nav>
  <div id="main">
    <div id="topbar"></div>
    <div id="screen"></div>
  </div>
</div>
<div id="modal" class="hidden"></div>
<script>
"use strict";
/* ============================================================
   STARSPHERE — phases 1+2: the living economy & the war game.
   Tick engine · offline catch-up · buildings · research ·
   ships · fleets · initiative combat · raider AI.
   All game rules live in pure functions (state in, state out)
   so a future server can run the same module.
   ============================================================ */

/* ================== GAME DATA (from the design doc) ================== */
const TICK_HOUR = 3600e3, TICK_FAST = 60e3;
const ROUND_TICKS = 1008;
const ROID_BASE_INCOME = 100;
const ROID_INIT_BASE = 2000;

const FACTIONS = {
  aurel:    { name:'Aurel Combine',     blurb:'Industrial builders. Construction time −20%, +25% ship armor.', buildMult:0.8 },
  vexari:   { name:'Vexari Corsairs',   blurb:'Fast raiders. All ETAs −1, −15% armor, +10% light-ship damage.', buildMult:1 },
  mistveil: { name:'Mistveil Syndicate',blurb:'Spies & thieves. Magpie steal +20%, +1 scan strength & resistance.', buildMult:1 },
  korvan:   { name:'Korvan Hegemony',   blurb:'Heavy warfleet. +20% damage, +15% ship cost.', buildMult:1 }
};

const BUILDINGS = {
  refinery:{ name:'Ore Refinery',  cost:[1500,800,200],  time:6,  fx:'+8% ore income / level' },
  array:   { name:'Crystal Array', cost:[800,1500,200],  time:6,  fx:'+8% crystal income / level' },
  siphon:  { name:'Flux Siphon',   cost:[800,800,900],   time:6,  fx:'+8% flux income / level' },
  shipyard:{ name:'Shipyard',      cost:[2000,1500,500], time:8,  fx:'+10% ship build speed · L6+: second parallel build line' },
  lab:     { name:'Astro Lab',     cost:[1000,2500,400], time:8,  fx:'+6 research points / tick' },
  spire:   { name:'Signal Spire',  cost:[600,2000,800],  time:6,  fx:'+1 scan strength' },
  veil:    { name:'Static Veil',   cost:[600,2000,800],  time:6,  fx:'+1 scan resistance' },
  bureau:  { name:'Watch Bureau',  cost:[1200,1200,600], time:8,  fx:'+12% thief/agent catch' },
  vault:   { name:'Deep Vault',    cost:[2000,1000,400], time:10, fx:'protects 15% stockpile / level' },
  bastion: { name:'Orbital Bastion',cost:[3000,2000,1500],time:12, fx:'static defense platform / level' }
};
const MAXLVL = 10;

const RESEARCH = {
  P:{ name:'Propulsion', rungs:[
    {n:'Ion Wake',     c:800,   d:'attack ETA 10 → 9'},
    {n:'Plasma Drive', c:2000,  d:'ETA 9 → 8'},
    {n:'Slipstream',   c:4500,  d:'ETA 8 → 7'},
    {n:'Fold Engine',  c:9000,  d:'ETA 7 → 6'},
    {n:'Void Lattice', c:16000, d:'ETA 6 → 5'} ]},
  H:{ name:'Hulls', rungs:[
    {n:'Light Frames',    c:600,   d:'unlocks Corvette'},
    {n:'Reinforced Keels',c:1800,  d:'unlocks Frigate'},
    {n:'Compound Armor',  c:4000,  d:'unlocks Destroyer'},
    {n:'Heavy Lattice',   c:8500,  d:'unlocks Cruiser'},
    {n:'Titan Works',     c:15000, d:'unlocks Capital'} ]},
  E:{ name:'Extraction', rungs:[
    {n:'Deep Bores',     c:700,   d:'+5% income per roid'},
    {n:'Seam Mapping',   c:1700,  d:'+5% income per roid'},
    {n:'Twin Foundries', c:3800,  d:'+5% income · second construction slot'},
    {n:'Core Taps',      c:8000,  d:'+5% income per roid'},
    {n:'Mantle Drills',  c:14000, d:'+5% income · roid cost growth ×1.12 → ×1.10'} ]},
  S:{ name:'Signals', rungs:[
    {n:'Planet Scan',   c:500,  d:'scan: overview of a planet'},
    {n:'Unit Scan',     c:1200, d:'scan: fleet composition'},
    {n:'News Scan',     c:2500, d:'scan: recent events'},
    {n:'Incoming Scan', c:5000, d:'see fleets targeting your galaxy'},
    {n:'Fleet Analysis',c:9000, d:'exact incoming composition'} ]},
  O:{ name:'Shadow Ops', rungs:[
    {n:'Agents',           c:700,   d:'covert op: Pilfer'},
    {n:'Saboteurs',        c:1600,  d:'covert op: Sabotage'},
    {n:'Provocateurs',     c:3500,  d:'covert op: Unrest'},
    {n:'Boarding Doctrine',c:7000,  d:'unlocks the MAGPIE thief ship'},
    {n:'Ghost Protocols',  c:12000, d:'+25% steal, ops −30% cost'} ]}
};
const RKEYS = ['P','H','E','S','O'];

/* ---- ships (phase 2) ---- */
const SHIPS = {
  scout:    { init:1,  tgt:['harvester'],                    armor:15,   dmg:4,   cost:[300,500,100],    prod:2,  hull:0 },
  corvette: { init:2,  tgt:['scout','corvette'],             armor:40,   dmg:14,  cost:[700,400,150],    prod:3,  hull:1 },
  frigate:  { init:4,  tgt:['corvette','magpie'],            armor:110,  dmg:32,  cost:[1500,900,300],   prod:5,  hull:2 },
  magpie:   { init:5,  tgt:['frigate','corvette','scout','harvester'], armor:60, dmg:0, cost:[1200,1500,800], prod:6, hull:0, thief:true },
  destroyer:{ init:6,  tgt:['capital','frigate'],            armor:260,  dmg:75,  cost:[3200,1800,700],  prod:8,  hull:3 },
  cruiser:  { init:8,  tgt:['destroyer','corvette'],         armor:600,  dmg:160, cost:[6500,4000,1600], prod:12, hull:4 },
  capital:  { init:10, tgt:['cruiser'],                      armor:1500, dmg:380, cost:[14000,9000,4000],prod:18, hull:5 },
  harvester:{ init:12, tgt:[],                               armor:90,   dmg:0,   cost:[1000,600,400],   prod:4,  hull:0 }
};
const CLS = ['scout','corvette','frigate','magpie','destroyer','cruiser','capital','harvester'];
/* Option B — cheaper military, larger fleets: ship costs scale down so a given
   economy fields a much bigger fleet; production speeds up to match (dial via SHIP_SCALE). */
const SHIP_SCALE = 6;
for (const _c in SHIPS) SHIPS[_c].cost = SHIPS[_c].cost.map(x => Math.max(1, Math.round(x / SHIP_SCALE)));
const SHIPNAMES = {
  aurel:   { scout:'Surveyor', corvette:'Mason',  frigate:'Rampart',  destroyer:'Bulwark',   cruiser:'Aegis',      capital:'Citadel',   harvester:'Magnate' },
  vexari:  { scout:'Wisp',     corvette:'Squall', frigate:'Gale',     destroyer:'Tempest',   cruiser:'Maelstrom',  capital:'Hurricane', harvester:'Plunderer' },
  mistveil:{ scout:'Glimmer',  corvette:'Shade',  frigate:'Wraith',   destroyer:'Phantasm',  cruiser:'Revenant',   capital:'Eclipse',   harvester:'Smuggler' },
  korvan:  { scout:'Talon',    corvette:'Saber',  frigate:'Lance',    destroyer:'Warhammer', cruiser:'Vindicator', capital:'Sovereign', harvester:'Tributary' }
};
function shipName(fac, cls){ return cls === 'magpie' ? 'Magpie' : SHIPNAMES[fac][cls]; }
function stealChance(s){
  return Math.min(0.9, 0.35 + (s.faction === 'mistveil' ? 0.20 : 0) + (s.research.done.O >= 5 ? 0.25 : 0));
}
function fArmor(fac){ return fac === 'aurel' ? 1.25 : fac === 'vexari' ? 0.85 : 1; }
function fDmg(fac, cls){
  let m = fac === 'korvan' ? 1.2 : 1;
  if (fac === 'vexari' && (cls === 'corvette' || cls === 'frigate')) m *= 1.1;
  return m;
}
function fCost(fac){ return fac === 'korvan' ? 1.15 : 1; }
function shipCost(s, cls){
  const m = fCost(s.faction);
  return SHIPS[cls].cost.map(c => Math.round(c * m));
}
function shipValue(fac, cls){
  const m = fCost(fac);
  return Math.round((SHIPS[cls].cost[0] + SHIPS[cls].cost[1] + SHIPS[cls].cost[2]) * m);
}
function fleetValue(fac, ships){
  let v = 0;
  for (const c of CLS) v += (ships[c] || 0) * shipValue(fac, c);
  return v;
}
function clsUnlocked(s, cls){
  if (cls === 'magpie') return s.research.done.O >= 4;
  return s.research.done.H >= SHIPS[cls].hull;
}
function roundScaleOf(s){ return (s && s.roundTicks) ? ROUND_TICKS / s.roundTicks : 1; }
function prodRate(s){ return SHIP_SCALE * (1 + 0.1 * lvl(s, 'shipyard')) * roundScaleOf(s); }
function prodSlots(s){ return lvl(s, 'shipyard') > 5 ? 2 : 1; }
function etaFor(s, ships){
  let e = 10 - s.research.done.P;
  if (s.faction === 'vexari') e -= 1;
  if (inBloc(s, 1)) e -= 1;
  if (s.faction === 'korvan' && (ships.capital || 0) > 0) e += 1;
  return Math.max(4, e);
}

/* ---- combat: initiative-ordered, damage split by armor pools.
   Each side is a list of WINGS, so allies fight with their own faction
   modifiers and losses land on the wing that owns the ships. ---- */
function battleW(attWings, defWings, defBastion, opts){
  opts = opts || {};
  const mk = ws => ws.map(w => {
    const cur = {};
    for (const c of CLS) cur[c] = w.ships[c] || 0;
    return { fac: w.fac, steal: w.steal || 0, bureau: w.bureau || 0,
             cur, before: { ...cur }, stolen: {} };
  });
  const A = mk(attWings), D = mk(defWings);
  let realCaps = 0;
  if (defBastion){
    realCaps = D[0].cur.capital;
    D[0].cur.capital += defBastion; // bastions fight as home-bound capitals
  }
  const topBureau = side => side.reduce((x, w) => Math.max(x, w.bureau), 0);
  const aBureau = topBureau(A), dBureau = topBureau(D);
  const steps = [...new Set(CLS.map(c => SHIPS[c].init))].sort((a, b) => a - b);
  for (const step of steps){
    const sA = A.map(w => ({ ...w.cur })), sD = D.map(w => ({ ...w.cur }));
    const kA = A.map(() => ({})), kD = D.map(() => ({}));
    // magpie grapples resolve at their initiative, before higher-init guns fire
    if (step === SHIPS.magpie.init){
      const grapple = (wings, snaps, enemy, enemyBureau) => {
        wings.forEach((w, wi) => {
          const n = Math.floor(snaps[wi].magpie || 0);
          if (n < 1) return;
          const p = Math.max(0.05, w.steal - 0.12 * enemyBureau);
          const catchW = 0.12 * enemyBureau;
          for (let k = 0; k < n; k++){
            const r = Math.random();
            if (r < p){
              let best = null, tot = 0;
              for (const t of SHIPS.magpie.tgt){
                const tt = enemy.reduce((x, ew) => x + ew.cur[t], 0);
                if (tt >= 1 && tt > tot){ best = t; tot = tt; }
              }
              if (best){
                let bw = null;
                for (const ew of enemy)
                  if (ew.cur[best] >= 1 && (bw === null || ew.cur[best] > bw.cur[best])) bw = ew;
                if (bw){ bw.cur[best]--; w.stolen[best] = (w.stolen[best] || 0) + 1; }
              }
            } else if (r < p + catchW){
              w.cur.magpie = Math.max(0, w.cur.magpie - 1);
            }
          }
        });
      };
      grapple(A, sA, D, dBureau);
      grapple(D, sD, A, aBureau);
    }
    const fire = (wings, snaps, enemy, esnaps, kills) => {
      wings.forEach((w, wi) => {
        for (const c of CLS){
          if (SHIPS[c].init !== step) continue;
          const n = snaps[wi][c];
          if (!(n > 0) || SHIPS[c].dmg <= 0) continue;
          const dmg = n * SHIPS[c].dmg * fDmg(w.fac, c);
          const pools = [];
          for (const t of SHIPS[c].tgt)
            enemy.forEach((ew, ei) => {
              if (esnaps[ei][t] > 0)
                pools.push({ ei, t, pool: esnaps[ei][t] * SHIPS[t].armor * fArmor(ew.fac) });
            });
          const tot = pools.reduce((x, p) => x + p.pool, 0);
          for (const p of pools)
            kills[p.ei][p.t] = (kills[p.ei][p.t] || 0) +
              (dmg * p.pool / tot) / (SHIPS[p.t].armor * fArmor(enemy[p.ei].fac));
        }
      });
    };
    fire(A, sA, D, sD, kD);
    fire(D, sD, A, sA, kA);
    D.forEach((w, wi) => { for (const c in kD[wi]) w.cur[c] = Math.max(0, w.cur[c] - kD[wi][c]); });
    A.forEach((w, wi) => { for (const c in kA[wi]) w.cur[c] = Math.max(0, w.cur[c] - kA[wi][c]); });
  }
  for (const w of A.concat(D)) for (const c of CLS) w.cur[c] = Math.round(w.cur[c]);
  // bastions absorb capital losses only after real capitals are gone
  let bastionLost = 0;
  if (defBastion){
    const capsLeft = D[0].cur.capital;
    const realLeft = Math.min(realCaps, capsLeft);
    bastionLost = Math.max(0, defBastion - (capsLeft - realLeft));
    D[0].cur.capital = realLeft;
  }
  const val = side => side.reduce((x, w) => x + fleetValue(w.fac, w.cur), 0);
  return { A, D, win: val(A) > val(D), bastionLost };
}
/* single-wing wrapper preserving the original battle() shape */
function battle(attFac, attShips, defFac, defShips, defBastion, opts){
  opts = opts || {};
  const r = battleW(
    [{ fac: attFac, ships: attShips, steal: opts.atkSteal, bureau: opts.atkBureau }],
    [{ fac: defFac, ships: defShips, steal: opts.defSteal, bureau: opts.defBureau }],
    defBastion, opts);
  const aw = r.A[0], dw = r.D[0];
  return { A: aw.cur, D: dw.cur, before: { A: aw.before, D: dw.before }, win: r.win,
           bastionLost: r.bastionLost, survHarv: aw.cur.harvester, stolenA: aw.stolen, stolenD: dw.stolen };
}
function captureRoids(roids, survHarv){
  const tot = roids.ore + roids.crystal + roids.flux;
  let take = Math.min(Math.floor(tot * 0.25), survHarv * 3);
  const got = { ore: 0, crystal: 0, flux: 0 };
  const order = ['ore', 'crystal', 'flux'].sort((a, b) => roids[b] - roids[a]);
  while (take > 0){
    let any = false;
    for (const t of order){
      if (take > 0 && roids[t] - got[t] > 1){ got[t]++; take--; any = true; }
    }
    if (!any) break;
  }
  return got;
}

function inBloc(s, idx){ return s && s.alliance != null && s.alliance === idx; }

  const t = [0, 0, 0, 0];

function genUniverse(){
  const facs = Object.keys(FACTIONS);

    for (let sl = 0; sl < GAL_SIZE; sl++){
      if (g === 0 && sl === 0) continue; // that slot is you
      const tier = Math.max(1, Math.min(5, 1 + Math.floor(g / 6) + ((g + sl) % 2)));
      const persona = (g === 0 && sl === 1) ? 'loyalist' : PKEYS[(g * 13 + sl * 7) % PKEYS.length];
      planets.push({
        id: id++, gal: g, slot: sl,
        name: GALPRE[g] + ' ' + PSUF[(g * 7 + sl * 5) % PSUF.length],
        fac: facs[(g + sl) % 4], tier, persona,
        alli: ((g * 3 + sl) % 5 < 3) ? (g + sl) % 4 : -1,
        /* everyone starts the round together — tier drives GROWTH, not a head start */
        roids: { ore: 9 + tier * 2 + (sl % 3), crystal: 7 + tier, flux: 5 + tier },
        ships: { scout: (3 + tier) * SHIP_SCALE, corvette: (4 + tier * 2) * SHIP_SCALE, frigate: Math.max(0, tier - 1) * SHIP_SCALE,
                 destroyer: 0, cruiser: 0, capital: 0,
                 harvester: (3 + tier) * SHIP_SCALE },
        stock: 3000 + tier * 1500, rebuild: 0, heat: 0, unrest: 0,

const SC_ROID = 1200, SC_FLEET = 25, SC_STORE = 400;
function devWorth(p){
  if (p.spent) return ((p.spent.research || 0) + (p.spent.buildings || 0)) / 8;
  if (p.rival) return Math.max(0, (p.eco || 1) - 1) / 0.1 * 3000;
  return 0;
}
function aiScore(p){
  if (p.human) return p.score || 0;
  const rN = p.roids.ore + p.roids.crystal + p.roids.flux;
  return Math.round(rN * SC_ROID + fleetValue(p.fac, p.ships) / SC_FLEET + (p.stock || 0) / SC_STORE + devWorth(p));
}
function playerRank(s){
  const my = score(s);
  let r = 1;
  for (const p of s.ai) if (aiScore(p) > my) r++;
  return r;
}
function mates(s){ return s.ai.filter(p => p.gal === 0 && p.humanSlot !== MYSLOT); }
function missionEta(s, ships, targetGal, defend){
  let e = etaFor(s, ships);
  if (defend) e -= 2;
  // your own cluster is close by — short hops, fast arrivals
  if (targetGal === 0) e = Math.min(e, defend ? 3 : 4);
  return Math.max(2, e);
}
function defEta(s){ return missionEta(s, {}, 0, true); }
/* cluster-mates pledging combat wings to a joint raid (no harvesters —
   their share comes from the stockpile, the roids are yours) */
function rollPledges(s){
  const wings = [];
  for (const m of mates(s)){
    if (wings.length >= 2) break;
    const ch = (m.rel / 100) * 0.5 * (m.persona === 'loyalist' ? 1.6 : 1);
    if (Math.random() < ch){
      const c2 = {};
      for (const k of CLS) c2[k] = (k === 'harvester' || k === 'magpie') ? 0 : Math.floor((m.ships[k] || 0) * 0.2);
      if (fleetValue(m.fac, c2) > 500) wings.push({ id: m.id, name: m.name, fac: m.fac, ships: c2 });
    }
  }
  return wings;
}

function migrate(s){
  if (s.v === 1){
    s.v = 2;
    s.ships = zeroShips(); s.prodQueue = []; s.missions = []; s.incoming = [];
    s.reports = []; s.ai = genUniverse();
    s.nextRaid = Math.max(s.tick, 72) + 30 + Math.floor(Math.random() * 40);
  }
  if (s.v === 2){
    s.v = 3;
    s.ships.magpie = s.ships.magpie || 0;
    s.intel = []; s.covertCd = 0;
    for (const p of s.ai){ p.heat = p.heat || 0; p.unrest = p.unrest || 0; }
  }
  if (s.v === 3){
    s.v = 4;
    s.ai = genUniverse();
    s.known = [0,1,2,3,4,5,6];
    s.news = []; s.wars = []; s.aHeat = [0,0,0,0];
    s.stats = { roidsStolen: 0, shipsStolen: 0, repelled: 0, escorts: 0, battles: 0, shipsLost: 0, shipsKilled: 0 };
    s.distress = null; s.rankCache = { t: s.tick, rank: 200 };
    for (const m of s.missions) if (m.target >= s.ai.length) m.target = 0;
    s.events.push({ t: s.tick, kind: 'round', text: 'The universe has expanded — 25 clusters, 199 rival worlds. Your old charts are obsolete.' });
  }
  if (s.v === 4){
    s.v = 5;
    s.scoreHist = [[s.tick, score(s)]];
    s.skin = false; s.sound = false; s.notify = false;
  }
  if (s.v === 5){
    s.v = 6;
    // round normalization: rivals now start the round with you instead of pre-grown
    s.ai = genUniverse();
    s.known = [0, 1, 2, 3, 4, 5, 6];
    s.incoming = []; s.distress = null;
    s.aHeat = [0, 0, 0, 0];
    for (const m of s.missions) if (m.target >= s.ai.length) m.target = 0;
    s.events.push({ t: s.tick, kind: 'round', text: 'Round normalization — the 199 rivals now begin the round alongside you. The climb is fair.' });
  }
  if (s.v === 6){
    s.v = 7;
    s.resQueue = [];
    s.presets = {};
  }
  if (s.v === 7){
    s.v = 8;
    // coords + the scanned/charted distinction: existing charted worlds stay revealed
    s.scanned = s.known.slice();
  }
  return s;
}
function lvl(s, k){ return s.buildings[k] || 0; }
function buildCost(s, k){
  const b = BUILDINGS[k], m = Math.pow(1.5, lvl(s, k));
  return b.cost.map(c => Math.round(c * m));
}
function buildTime(s, k){
  const t = BUILDINGS[k].time + 2 * lvl(s, k);
  return Math.max(1, Math.ceil(t * FACTIONS[s.faction].buildMult * (inBloc(s, 3) ? 0.85 : 1) / roundScaleOf(s)));
}
function buildSlots(s){ return s.research.done.E >= 3 ? 2 : 1; }
function roidGrowth(s){ return s.research.done.E >= 5 ? 1.10 : 1.12; }
function roidCost(s, type){
  const owned = s.roids[type] + s.roidQueue.filter(q => q.type === type).length;
  return Math.round(ROID_INIT_BASE * Math.pow(roidGrowth(s), owned));
}
function rpPerTick(s){ return (4 + 6 * lvl(s, 'lab')) * roundScaleOf(s) * (s.researchMult || 1); }
function incomeBonus(s, type){
  const bld = type === 'ore' ? 'refinery' : type === 'crystal' ? 'array' : 'siphon';
  return 1 + 0.08 * lvl(s, bld) + 0.05 * s.research.done.E;
}
function incomePerTick(s, type){
  return Math.round(s.roids[type] * ROID_BASE_INCOME * incomeBonus(s, type) * roundScaleOf(s));
}
function canAfford(s, cost){
  return s.res.ore >= cost[0] && s.res.crystal >= cost[1] && s.res.flux >= cost[2];
}
function affordTicks(s, cost){
  const names = ['ore', 'crystal', 'flux'];
  let worst = 0;
  for (let i = 0; i < 3; i++){
    const deficit = cost[i] - s.res[names[i]];
    if (deficit > 0){
      const inc = incomePerTick(s, names[i]);
      if (inc <= 0) return Infinity;
      worst = Math.max(worst, Math.ceil(deficit / inc));
    }
  }
  return worst;
}
function affordHint(s, cost){
  if (canAfford(s, cost)) return '';
  const n = affordTicks(s, cost);
  return n === Infinity ? ' · <span class="red">no income for this</span>'
                        : ' · <span class="amber">affordable in ~' + n + 't</span>';
}
function pay(s, cost){ s.res.ore -= cost[0]; s.res.crystal -= cost[1]; s.res.flux -= cost[2]; }
function playerFleetValue(s){
  let v = fleetValue(s.faction, s.ships);
  for (const m of s.missions) v += fleetValue(s.faction, m.ships);
  return v;
}
function score(s){
  const roidsN = s.roids.ore + s.roids.crystal + s.roids.flux;
  const stored = (s.res.ore || 0) + (s.res.crystal || 0) + (s.res.flux || 0);
  return Math.round(roidsN * SC_ROID + playerFleetValue(s) / SC_FLEET + stored / SC_STORE + devWorth(s));
}

/* one tick: the heart of the game */
/* a real raider fleet bearing down on a cluster-mate, scaled so the mate
   usually needs help but a strong escort tips the fight */
function genDistressRaiders(s, mate){
  const srcs = s.ai.filter(p => p.gal !== 0);
  const src = srcs[Math.floor(Math.random() * srcs.length)] || mate;
  const defVal = fleetValue(mate.fac, mate.ships) || 8000;
  let budget = Math.max(6000, defVal * (0.9 + Math.random() * 0.7));
  const ships = zeroShips();
  const pool = ['corvette'];
  if (s.tick > 150) pool.push('frigate');
  if (s.tick > 350) pool.push('destroyer');
  if (s.tick > 600) pool.push('cruiser');
  while (budget > 0){
    const c = pool[Math.floor(Math.random() * pool.length)];
    const v = shipValue(src.fac, c);
    const n = Math.max(1, Math.floor(budget * 0.4 / v));
    ships[c] += n; budget -= n * v;
  }
  const count = CLS.reduce((x, c) => x + ships[c], 0);
  return { fac: src.fac, ships, count, srcName: src.name };
}
/* the assault lands: the mate's fleet + every staged escort wing fight the
   raiders in one real battle, survivors fly home, a report is filed */
function resolveDistress(s){
  const d = s.distress;
  const mate = s.ai[d.mate];
  s.distress = null;
  const staged = s.missions.filter(m => m.kind === 'defend' && m.phase === 'staged' && m.target === mate.id);
  const defWings = [{ fac: mate.fac, ships: { ...mate.ships }, steal: 0, bureau: Math.floor(mate.tier / 2) }];
  for (const m of staged) defWings.push({ fac: s.faction, ships: { ...m.ships }, mref: m });
  const res = battleW([{ fac: d.fac, ships: d.ships, steal: 0.35, bureau: 1 }], defWings, 0, {});
  const repelled = !res.win;
  mate.ships = { ...res.D[0].cur };
  res.D.forEach((w, i) => {
    if (i === 0) return;
    const m = defWings[i].mref;
    for (const c of CLS) m.ships[c] = w.cur[c];
    m.phase = 'back'; m.left = m.total;
  });
  if (!repelled) mate.rebuild = Math.max(mate.rebuild || 0, 24);
  if (staged.length){
    s.stats.escorts++;

      mine: snapRows(s.faction, before, after),
      theirs: snapRows(d.fac, res.A[0].before, res.A[0].cur),
      enemy: 'Raiders of ' + d.srcName, theirFac: d.fac,

function doTick(s){
  if (s.roundOver) return;
  s.tick++;
  // income
  s.res.ore += incomePerTick(s, 'ore');
  s.res.crystal += incomePerTick(s, 'crystal');
  s.res.flux += incomePerTick(s, 'flux');
  // construction: only the active slots tick; the rest wait in line
  const slots = buildSlots(s);
  s.buildQueue.forEach((q, i) => { if (i < slots) q.left--; });
  while (s.buildQueue.length && s.buildQueue[0].left <= 0){
    const q = s.buildQueue.shift();
    s.buildings[q.key] = (s.buildings[q.key] || 0) + 1;
    logEv(s, 'build', BUILDINGS[q.key].name + ' completed (level ' + s.buildings[q.key] + ').');
  }
  // sort so finished items pop even if not first
  s.buildQueue = s.buildQueue.filter(q => {
    if (q.left <= 0){
      s.buildings[q.key] = (s.buildings[q.key] || 0) + 1;
      logEv(s, 'build', BUILDINGS[q.key].name + ' completed (level ' + s.buildings[q.key] + ').');
      return false;
    }
    return true;
  });
  // roid initiation (one at a time)
  if (s.roidQueue.length){
    s.roidQueue[0].left--;

      const q = s.roidQueue.shift();
      s.roids[q.type]++;
      logEv(s, 'roid', 'New ' + q.type + ' asteroid initiated. (' + s.roids[q.type] + ' total)');
    }
  }
  // research
  if (s.research.branch){
    s.research.progress += rpPerTick(s);
    const br = s.research.branch;
    const rung = RESEARCH[br].rungs[s.research.done[br]];
    if (s.research.progress >= rung.c){
      s.research.done[br]++;
      s.spent.research += rung.c;
      logEv(s, 'research', RESEARCH[br].name + ': "' + rung.n + '" research complete.');
      s.research.branch = null; s.research.progress = 0;
    }
  }
  // the research queue keeps the labs from ever idling
  if (!s.research.branch && (s.resQueue || []).length){
    while (s.resQueue.length){
      const bk = s.resQueue.shift();
      if (s.research.done[bk] < 5){
        s.research.branch = bk; s.research.progress = 0;
        logEv(s, 'research', 'From the queue: research begun — "' + RESEARCH[bk].rungs[s.research.done[bk]].n + '".');
        break;

    }
  }
  // ship production (delivered incrementally; L6+ shipyards run parallel lines)
  for (const q of s.prodQueue.slice(0, prodSlots(s))){
    q.progress += prodRate(s);

    while (q.progress >= unit && q.done < q.count){
      q.progress -= unit;
      q.done++;
      s.ships[q.cls]++;
    }
  }
  s.prodQueue = s.prodQueue.filter(q => {
    if (q.done >= q.count){
      logEv(s, 'build', q.count + '× ' + shipName(s.faction, q.cls) + ' delivered from the Shipyard.');
      return false;
    }
    return true;
  });
  // missions (staged escorts wait for the assault — they don't fly or count down)
  for (const m of s.missions) if (m.phase !== 'staged') m.left--;
  for (const m of s.missions.slice()){
    if (m.phase === 'staged' || m.left > 0) continue;
    if (m.kind === 'evade'){
      for (const c of CLS) s.ships[c] += m.ships[c] || 0;
      logEv(s, 'build', 'The home fleet returns from evasive maneuvers — intact.');
      s.missions.splice(s.missions.indexOf(m), 1);
      continue;
    }
    if (m.phase === 'out'){
      if (m.kind === 'defend'){
        const mate = s.ai[m.target];
        // if the assault is still inbound, stage at the mate and fight at impact
        if (s.distress && s.distress.mate === m.target && s.distress.left > 0){
          m.phase = 'staged';
          logEv(s, 'battle', 'Our escort reached ' + mate.name + ' — holding position for the assault (' + s.distress.left + 't to impact).', mate.id);
          continue;
        }
        // arrived after it was already decided
        mate.rel = Math.min(100, mate.rel + 4);
        logEv(s, 'battle', 'We reached ' + mate.name + ' after the battle — the gesture still counted. (+4 relations)', mate.id);
        s.reports.push({
          t: s.tick, kind: 'defend', playerWon: false,
          title: 'Arrived late at ' + mate.name,
          mine: snapRows(s.faction, m.ships, m.ships), theirs: [],
          enemy: mate.name, theirFac: mate.fac,
          loot: { roids: { ore: 0, crystal: 0, flux: 0 }, ore: 0, crystal: 0, flux: 0 },
          bastionLost: 0, stolenByUs: '', stolenByThem: '',
          note: '+4 relations — the battle was already over.'
        });
        if (s.reports.length > 60) s.reports.splice(0, s.reports.length - 60);
      } else {
        resolveAttack(s, m);
      }
      m.phase = 'back';
      m.left = m.total;
    } else {
      for (const c of CLS) s.ships[c] += m.ships[c] || 0;
      logEv(s, 'build', 'Fleet returned home from ' + s.ai[m.target].name + '.', m.target);
      s.missions.splice(s.missions.indexOf(m), 1);
    }
  }
  // incoming raids
  for (const inc of s.incoming) inc.left--;
  for (const inc of s.incoming.slice()){
    if (inc.left <= 0){
      resolveRaid(s, inc);
      s.incoming.splice(s.incoming.indexOf(inc), 1);
    }
  }
  // covert cooldown & rival tempers
  if (s.covertCd > 0) s.covertCd--;
  if (s.scanReqCd > 0) s.scanReqCd--;
  // rival planets grow (persona-flavored, staggered by id)
  for (const p of s.ai){
    const slow = p.unrest > 0 ? 0.5 : 1;
    if (p.unrest > 0) p.unrest--;
    if (p.aidCd > 0) p.aidCd--;
    if (s.tick % (p.persona === 'hothead' ? 24 : 12) === 0 && p.heat > 0) p.heat--;
    const eco = p.persona === 'farmer' ? 0.55 : 0.4;
    p.stock += Math.round((p.roids.ore + p.roids.crystal + p.roids.flux) * ROID_BASE_INCOME * eco * slow);
    if (p.rebuild > 0) p.rebuild--;
    if ((s.tick + p.id) % 24 === 0 && p.rebuild <= 0 && p.unrest <= 0){
      const mil = (p.persona === 'turtle' ? 1.6 : p.persona === 'farmer' ? 0.5 : 1) * SHIP_SCALE;
      p.ships.corvette += Math.round((2 + p.tier * 2) * mil);
      p.ships.frigate += Math.round(p.tier * mil);
      if (s.tick > 200) p.ships.destroyer += Math.ceil(p.tier * mil / 2);
      if (s.tick > 450) p.ships.cruiser += Math.ceil(p.tier * mil / 3);
      if (s.tick > 700) p.ships.capital += Math.floor(p.tier * mil / 3);
      p.ships.harvester += SHIP_SCALE;
    }
    if ((s.tick + p.id) % 30 === 0 && p.rebuild <= 0){
      const t = ['ore','crystal','flux'][p.id % 3];
      p.roids[t] += p.persona === 'farmer' ? 2 : 1;
    }
  }
  // alliance pledge resolves after its window
  if (s.alliancePending && s.tick >= s.alliancePending.at){
    const from = s.alliance, to = s.alliancePending.to;
    s.alliance = to; s.alliancePending = null;
    if (to == null) logEv(s, 'round', 'We have left our alliance and stand independent once more.');
    else {
      logEv(s, 'round', 'We now fly the banner of ' + ALLIANCES[to].name + '. ' + ALLIANCES[to].perk);
      newsEv(s, s.planet + ' pledges to ' + ALLIANCES[to].name + '.');
      if (from != null && from !== to){ s.aHeat[from] = Math.min(12, (s.aHeat[from] || 0) + 6);
        newsEv(s, ALLIANCES[from].name + ' brands ' + s.planet + ' a traitor for defecting.'); }
    }
  }
  if (s.alliance != null && s.tick % 4 === 0)
    for (const p of s.ai) if (p.alli === s.alliance && !s.known.includes(p.id)) s.known.push(p.id);
  // alliance politics & universe news
  for (let i = 0; i < 4; i++) if (s.tick % 12 === 0 && s.aHeat[i] > 0) s.aHeat[i]--;
  if (Math.random() < 0.02){
    const a = Math.floor(Math.random() * 4), b = (a + 1 + Math.floor(Math.random() * 3)) % 4;
    const at = s.wars.findIndex(w => (w[0] === a && w[1] === b) || (w[0] === b && w[1] === a));
    if (at >= 0){ s.wars.splice(at, 1); newsEv(s, ALLIANCES[a].name + ' and ' + ALLIANCES[b].name + ' sign an armistice.'); }
    else if (s.wars.length < 2){ s.wars.push([a, b]); newsEv(s, ALLIANCES[a].name + ' declares WAR on ' + ALLIANCES[b].name + '!'); }
  }
  if (Math.random() < 0.06){
    const p1 = s.ai[Math.floor(Math.random() * s.ai.length)];
    const p2 = s.ai[Math.floor(Math.random() * s.ai.length)];
    if (p1 !== p2 && p1.gal !== p2.gal){
      const lost = (50 + Math.floor(Math.random() * 400)) * p2.tier;
      p2.ships.corvette = Math.max(0, p2.ships.corvette - Math.floor(lost / 200));
      newsEv(s, 'Raiders from ' + p1.name + ' struck ' + p2.name + ' — ' + fmt2(lost) + ' tons of wreckage.');
    }
  }
  // schemers probe you
  if (Math.random() < 0.025){
    const sch = s.ai.filter(p => p.persona === 'schemer');
    const sp = sch[Math.floor(Math.random() * sch.length)];
    if (sp){
      if (lvl(s, 'veil') + Math.random() * 6 > sp.tier + Math.random() * 6)
        logEv(s, 'intel', 'Our Static Veil deflected a probe from ' + sp.name + '.', sp.id);
      else {
        logEv(s, 'intel', sp.name + ' scanned us. They know what we have.', sp.id);
        sp.heat = Math.min(8, sp.heat + 1);
      }
    }
  }
  // a cluster-mate cries for help — a real raider fleet is bearing down
  if (!s.distress && s.tick > 100 && Math.random() < 1 / 70){
    const ms = mates(s);
    const m = ms[Math.floor(Math.random() * ms.length)];
    const raid = genDistressRaiders(s, m);
    s.distress = { mate: m.id, left: 6, total: 6, fac: raid.fac, ships: raid.ships, count: raid.count, srcName: raid.srcName };
    logEv(s, 'incoming', m.name + ' is under attack by ' + raid.count + ' ships from ' + raid.srcName +
      '! Distress call — 6 ticks to get an escort there (Galaxy screen).', m.id);
  } else if (s.distress){
    s.distress.left--;
    if (s.distress.left <= 0) resolveDistress(s);
  }
  if (s.tick % 12 === 0) s.rankCache = { t: s.tick, rank: playerRank(s) };
  if (s.tick % 6 === 0){
    s.scoreHist.push([s.tick, score(s)]);
    if (s.scoreHist.length > 300) s.scoreHist.splice(0, s.scoreHist.length - 300);
  }
  // raider scheduling (protection until tick 72; a second raid slot opens in the top 50)
  const maxInc = (s.rankCache.rank <= 50) ? 2 : 1;
  if (s.tick >= s.nextRaid && s.tick >= 72 && s.incoming.length < maxInc){
    spawnRaid(s);
    s.nextRaid = s.tick + 40 + Math.floor(Math.random() * 50);
  }
  // round end
  if (s.tick >= ROUND_TICKS){
    s.roundOver = true;
    const win = blocWinner(s); s.winningBloc = win;
    logEv(s, 'round', 'THE ROUND HAS ENDED. ' + ALLIANCES[win].name + ' wins the round. Your final score: ' +
      score(s).toLocaleString() + (s.alliance === win ? ' — under the winning banner!' :
      (s.alliance != null ? ' — your alliance fell short.' : ' — you stood alone.')) + '.');
  }
}
/* ---- battles & raids ---- */
function snapRows(fac, before, after){
  return CLS.filter(c => (before[c] || 0) > 0).map(c => ({
    cls: c, name: shipName(fac, c), before: before[c] || 0, after: after[c] || 0
  }));
}
function tallyBattle(s, mb, ma, eb, ea){
  if (!s.stats) return;
  s.stats.battles = (s.stats.battles || 0) + 1;
  let lost = 0, killed = 0;
  for (const c of CLS){ lost += Math.max(0, (mb[c] || 0) - (ma[c] || 0)); killed += Math.max(0, (eb[c] || 0) - (ea[c] || 0)); }
  s.stats.shipsLost = (s.stats.shipsLost || 0) + lost;
  s.stats.shipsKilled = (s.stats.shipsKilled || 0) + killed;
}
function defWingFrom(m){
  const c2 = {};
  for (const k of CLS) c2[k] = Math.floor((m.ships[k] || 0) * 0.2);
  return fleetValue(m.fac, c2) > 500 ? { name: m.name, fac: m.fac, ships: c2 } : null;
}
function rollBlocDefense(s, p){
  const aid = [];
  if (p.alli < 0) return aid;
  for (const q of s.ai){
    if (aid.length >= 2) break;
    if (q === p || q.alli !== p.alli || q.human) continue;
    if (Math.random() < 0.4){ const w = defWingFrom(q); if (w) aid.push(w); }
  }

}
function resolveAttack(s, m){
  const p = s.ai[m.target];
  const attWings = [{ fac: s.faction, ships: m.ships, steal: stealChance(s), bureau: lvl(s, 'bureau') }];
  for (const w of (m.wings || [])) attWings.push({ fac: w.fac, ships: w.ships, name: w.name, id: w.id });
  const blocDef = rollBlocDefense(s, p);
  const dWings = [{ fac: p.fac, ships: p.ships, steal: 0, bureau: Math.floor(p.tier / 2) }];
  for (const a of blocDef) dWings.push({ fac: a.fac, ships: a.ships });
  if (blocDef.length) logEv(s, 'battle', blocDef.length + ' ' + ALLIANCES[p.alli].name + ' wing(s) rallied to defend ' + p.name + '.', p.id);
  const res = battleW(attWings, dWings, 0, {});
  const rep = { win: res.win, A: res.A[0].cur, D: res.D[0].cur,
                before: { A: res.A[0].before, D: res.D[0].before },
                survHarv: res.A[0].cur.harvester, stolenA: res.A[0].stolen };
  tallyBattle(s, rep.before.A, rep.A, rep.before.D, rep.D);
  p.ships = rep.D;
  m.ships = rep.A;
  let stoleN = 0;
  for (const c in rep.stolenA){ m.ships[c] = (m.ships[c] || 0) + rep.stolenA[c]; stoleN += rep.stolenA[c]; }
  if (stoleN) logEv(s, 'battle', 'Our Magpies grappled ' + stoleN + ' enemy ship(s) at ' + p.name + ' — flying them home.', p.id);
  p.heat = Math.min(8, (p.heat || 0) + (p.persona === 'hothead' ? 4 : 2));
  s.stats.shipsStolen += stoleN;
  if (!s.known.includes(p.id)) s.known.push(p.id);
  if (!s.scanned.includes(p.id)) s.scanned.push(p.id); // a fought world is a seen world
  if (p.gal === 0){
    p.rel = Math.max(0, p.rel - 25);
    logEv(s, 'round', 'We raided our own cluster-mate. ' + p.name + ' will not forget this.', p.id);
  }
  if (p.alli >= 0){
    s.aHeat[p.alli] = Math.min(12, s.aHeat[p.alli] + 6);
    newsEv(s, ALLIANCES[p.alli].name + ' condemns the raid on ' + p.name + '.');
  }
  const loot = { roids: { ore:0, crystal:0, flux:0 }, ore:0, crystal:0, flux:0 };
  if (rep.win){
    loot.roids = captureRoids(p.roids, rep.survHarv);
    for (const t of ['ore','crystal','flux']){ p.roids[t] -= loot.roids[t]; s.roids[t] += loot.roids[t]; }
    const grab = Math.floor(p.stock * 0.3);
    // allied wings take their stockpile share, split by surviving fleet value
    const vals = res.A.map((w, i) => fleetValue(attWings[i].fac, w.cur));
    const vTot = Math.max(1, vals.reduce((a, b) => a + b, 0));
    const myCut = Math.floor(grab * vals[0] / vTot);
    loot.ore = Math.floor(myCut * 0.5); loot.crystal = Math.floor(myCut * 0.3); loot.flux = Math.floor(myCut * 0.2);
    p.stock -= grab;
    s.res.ore += loot.ore; s.res.crystal += loot.crystal; s.res.flux += loot.flux;
    res.A.forEach((w, i) => {
      if (i === 0) return;
      const mate = s.ai[attWings[i].id];
      if (mate) mate.stock += Math.floor(grab * vals[i] / vTot);
    });
    p.rebuild = 48;
    const rN = loot.roids.ore + loot.roids.crystal + loot.roids.flux;
    s.stats.roidsStolen += rN;
    logEv(s, 'battle', 'VICTORY at ' + p.name + ' — ' + rN + ' roids and ' + fmt2(grab) + ' resources seized.', p.id);
  } else {
    logEv(s, 'battle', 'Our assault on ' + p.name + ' was repelled.', p.id);
  }
  for (const w of (m.wings || [])){
    const mate = s.ai[w.id];
    if (!mate) continue;
    mate.rel = Math.max(0, Math.min(100, mate.rel + (rep.win ? 4 : -2)));
    logEv(s, 'battle', mate.name + (rep.win ?
      "'s wing flies home with its share of the spoils (+4 relations)." :
      "'s wing took losses beside us (−2 relations)."), mate.id);
  }
  s.reports.push({
    t: s.tick, kind: 'attack', playerWon: rep.win,
    sent: { ...rep.before.A }, targetId: p.id,
    title: (rep.win ? 'Victory' : 'Defeat') + ' at ' + p.name,
    allies: (m.wings && m.wings.length) ?
      m.wings.map(w => w.name + ' (wing of ' + CLS.reduce((x, c) => x + (w.ships[c] || 0), 0) + ')').join(', ') : '',
    mine: snapRows(s.faction, rep.before.A, rep.A),
    theirs: snapRows(p.fac, rep.before.D, rep.D),
    enemy: p.name, theirFac: p.fac, loot, bastionLost: 0,
    note: blocDef.length ? p.name + ' was reinforced by ' + ALLIANCES[p.alli].name + ': ' + blocDef.map(a => a.name).join(', ') + '.' : undefined,
    stolenByUs: CLS.filter(c => rep.stolenA[c]).map(c => rep.stolenA[c] + '× ' + shipName(p.fac, c)).join(', '),
    stolenByThem: ''
  });
  if (s.reports.length > 60) s.reports.splice(0, s.reports.length - 60);
}

function resolveRaid(s, inc){

  const defWings = [{ fac: s.faction, ships: { ...s.ships }, steal: stealChance(s), bureau: lvl(s, 'bureau') }];
  for (const a of (inc.aid || [])) defWings.push({ fac: a.fac || s.faction, ships: a.ships });
  const res = battleW(
    [{ fac: inc.fac, ships: inc.ships, steal: 0.35, bureau: Math.floor((inc.srcTier || 1) / 2) }],
    defWings, bastion, {});
  const rep = { win: res.win, bastionLost: res.bastionLost,
                A: res.A[0].cur, D: res.D[0].cur,
                before: { A: res.A[0].before, D: res.D[0].before },
                stolenA: res.A[0].stolen, stolenD: res.D[0].stolen,
                survHarv: res.A[0].cur.harvester };
  s.ships = { ...rep.D };
  tallyBattle(s, rep.before.D, rep.D, rep.before.A, rep.A);
  if (!rep.win) s.stats.repelled++;
  let weStole = 0, theyStole = 0;
  for (const c in rep.stolenD){ s.ships[c] = (s.ships[c] || 0) + rep.stolenD[c]; weStole += rep.stolenD[c]; }
  for (const c in rep.stolenA) theyStole += rep.stolenA[c];
  if (weStole) logEv(s, 'battle', 'Our defending Magpies grappled ' + weStole + ' raider ship(s)!', inc.srcId);
  if (theyStole) logEv(s, 'battle', 'Enemy Magpies stole ' + theyStole + ' of our ships!', inc.srcId);
  if (rep.bastionLost > 0){
    s.buildings.bastion = Math.max(0, (s.buildings.bastion || 0) - rep.bastionLost);
    logEv(s, 'battle', rep.bastionLost + ' Orbital Bastion(s) destroyed in the attack.');
  }
  const loot = { roids: { ore:0, crystal:0, flux:0 }, ore:0, crystal:0, flux:0 };
  if (rep.win){
    loot.roids = captureRoids(s.roids, rep.survHarv);
    for (const t of ['ore','crystal','flux']) s.roids[t] -= loot.roids[t];
    const prot = Math.min(0.75, 0.15 * lvl(s, 'vault'));
    for (const t of ['ore','crystal','flux']){
      loot[t] = Math.floor(s.res[t] * (1 - prot) * 0.2);
      s.res[t] -= loot[t];
    }
    const rN = loot.roids.ore + loot.roids.crystal + loot.roids.flux;
    logEv(s, 'battle', 'DEFEAT — ' + inc.name + ' took ' + rN + ' roids and plundered our stores.', inc.srcId);
  } else {
    logEv(s, 'battle', 'Raid repelled! ' + inc.name + ' broke against our defenses.', inc.srcId);
  }
  s.reports.push({
    t: s.tick, kind: 'raid', playerWon: !rep.win,
    title: (rep.win ? 'Raided by ' : 'Repelled ') + inc.name,
    allies: (inc.aid || []).map(a => a.name + ' (defense wing)').join(', '),
    mine: snapRows(s.faction, rep.before.D, rep.D),
    theirs: snapRows(inc.fac, rep.before.A, rep.A),
    enemy: inc.name, theirFac: inc.fac, loot, bastionLost: rep.bastionLost,
    stolenByUs: CLS.filter(c => rep.stolenD[c]).map(c => rep.stolenD[c] + '× ' + shipName(inc.fac, c)).join(', '),
    stolenByThem: CLS.filter(c => rep.stolenA[c]).map(c => rep.stolenA[c] + '× ' + shipName(s.faction, c)).join(', ')
  });
  if (s.reports.length > 60) s.reports.splice(0, s.reports.length - 60);
}

function nextTickAt(s){
  if (s.tickMode === 'manual') return Infinity;
  if (s.tickMode === 'fast') return s.lastTickAt + TICK_FAST;

function tone(type, f0, f1, dur, vol, when){
  if (!AC || !S || !S.sound) return;
  const t0 = AC.currentTime + (when || 0);
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.setValueAtTime(f0, t0);
  if (f1 && f1 !== f0) o.frequency.exponentialRampToValueAtTime(Math.max(f1, 1), t0 + dur);
  g.gain.setValueAtTime(vol, t0);
  g.gain.exponentialRampToValueAtTime(0.0008, t0 + dur);

  lg.gain.value = 0.006;

  o.connect(g).connect(AC.destination);
  o.start(); lfo.start();
  ambient = { o, g, lfo };
}

const STUBS = [];

function render(){

              comms: rComms, settings: rSettings, production: rProduction,

  wire();

}
function renderRail(){
  const inc = S.incoming.length;
  $('#rail').innerHTML =
    '<div class="logo">STARSPHERE<small>online · ' + (USER || '') + '</small></div>' +
    '<div style="border:1px solid var(--cyd);border-radius:10px;padding:9px 11px;margin-bottom:12px">' +
    '<div style="font-size:14px;font-weight:700;color:var(--cy)">' + S.planet + '</div>' +
    '<div class="muted">ruled by <b style="color:var(--ink)">' + S.ruler + '</b></div>' +
    '<div class="muted">' + FACTIONS[S.faction].name + '</div></div>' +
    NAV.map(([k, label]) =>

      (k === 'fleets' && inc ? '<span class="ph" style="color:var(--rd);border-color:var(--rd)">⚠' + inc + '</span>' : '') +
      (k === 'galaxy' && S.distress ? '<span class="ph" style="color:var(--am);border-color:var(--am)">⚠' + S.distress.left + 't</span>' : '') +
      '</button>'
    ).join('') +
    '<button class="navbtn" data-lobby="1">Lobby</button>' +
    STUBS.map(([label, ph]) =>
      '<button class="navbtn stub">' + label + '<span class="ph">' + ph + '</span></button>'
    ).join('') +

}
function clockStr(){
  if (S.tickMode === 'manual') return 'manual';
  const ms = nextTickAt(S) - srvNow();
  if (ms <= 0) return 'now…';
  const m = Math.floor(ms / 60000), s2 = Math.floor(ms % 60000 / 1000);
  return (m > 0 ? m + 'm ' : '') + s2 + 's';
}
function evHtml(e){
  const click = e.pid !== undefined && S.ai[e.pid];
  const coord = click ? coordChip(coordOf(S.ai[e.pid])) : '';
  return '<div class="ev kind-' + e.kind + (click ? ' evclick" data-evp="' + e.pid : '') + '" ' +
    (click ? 'title="open ' + S.ai[e.pid].name + ' [' + coordStr(S.ai[e.pid].gal, S.ai[e.pid].slot) + '] in Intel"' : '') + '>' +
    '<span class="tk">tick ' + e.t + '</span><span class="tx">' + coord + e.text + '</span>' +
    (click ? '<span class="muted" style="margin-left:auto">›</span>' : '') + '</div>';
}
function unseenReports(){
  const seenT = (S.reportSeenT === undefined) ? -1 : S.reportSeenT;
  return S.reports.filter(r => r.t > seenT && r.t > S.tick - 48).length;
}
function renderTopbar(){
  const nRep = unseenReports();
  $('#topbar').innerHTML =
    '<span>TICK <b>' + S.tick + '</b> / ' + (S.roundTicks || ROUND_TICKS) + '</span>' +
    '<span>next tick in <span class="clock">' + clockStr() + '</span></span>' +
    '<span title="ore · +' + fmt(incomePerTick(S, 'ore')) + '/t">' + resIcon('ore', 15) + ' <b>' + fmt(S.res.ore) + '</b></span>' +
    '<span title="crystal · +' + fmt(incomePerTick(S, 'crystal')) + '/t">' + resIcon('crystal', 15) + ' <b>' + fmt(S.res.crystal) + '</b></span>' +
    '<span title="flux · +' + fmt(incomePerTick(S, 'flux')) + '/t">' + resIcon('flux', 15) + ' <b>' + fmt(S.res.flux) + '</b></span>' +
    '<span>SCORE <b class="amber">' + fmt(score(S)) + '</b></span>' +
    (S.incoming.length ?
      '<span class="red" data-goto="fleets" style="font-weight:700;cursor:pointer;text-decoration:underline dotted;text-underline-offset:3px" ' +
      'title="open Fleets — review your defenses">⚠ RAID INCOMING ×' + S.incoming.length +
      ' (' + Math.min(...S.incoming.map(i => i.left)) + 't)</span>' : '') +
    (nRep ?
      '<span class="amber" data-goto="comms" style="font-weight:700;cursor:pointer;text-decoration:underline dotted;text-underline-offset:3px" ' +
      'title="open Comms — read the battle reports">📄 battle report' + (nRep > 1 ? 's ×' + nRep : '') + '</span>' : '') +
    (S.distress ?
      '<span class="amber" data-goto="galaxy" style="font-weight:700;cursor:pointer;text-decoration:underline dotted;text-underline-offset:3px" ' +
      'title="open Galaxy — dispatch an escort">⚠ ' + S.ai[S.distress.mate].name +
      ' under attack (' + S.distress.left + 't)</span>' : '') +
    rallyChip() +
    '<span style="margin-left:auto" class="muted">' + S.planet + ' · ' + FACTIONS[S.faction].name + '</span>';
}
function ring(pct, size, cls){
  const r = (size - 8) / 2, c = 2 * Math.PI * r;
  return '<svg class="ring ' + (cls || '') + '" width="' + size + '" height="' + size + '">' +
    '<circle class="bgc" cx="' + size/2 + '" cy="' + size/2 + '" r="' + r + '" stroke-width="5"/>' +
    '<circle class="fgc" cx="' + size/2 + '" cy="' + size/2 + '" r="' + r + '" stroke-width="5" ' +
    'stroke-dasharray="' + c + '" stroke-dashoffset="' + c * (1 - Math.max(0, Math.min(1, pct))) + '"/></svg>';
}
function costStr(s, cost){
  const ok = ['ore','crystal','flux'];
  return cost.map((c, i) =>
    '<b class="' + (S.res[ok[i]] >= c ? '' : 'no') + '">' + fmt(c) + '</b> ' + ok[i].slice(0,2).toUpperCase()
  ).join(' · ');
}

function fleetLine(fac, ships){
  return CLS.filter(c => (ships[c] || 0) > 0).map(c =>
    (typeof shipIcon === 'function' ? shipIcon(c, 15, fac) + ' ' : '') + ships[c] + '× ' + shipName(fac, c)).join(' · ') || '—';
}
function incomingBanner(){
  if (!S.incoming.length) return '';
  const evading = S.missions.some(m => m.kind === 'evade');
  return S.incoming.map(inc => {
    // how much of the raider composition can we see? own Signals research, or an ally scan (inc.revealed)
    const rev = inc.revealed || 0;
    const exact = S.research.done.S >= 5 || rev >= 2;
    const classes = S.research.done.S >= 4 || rev >= 1;
    let detail;
    if (exact) detail = fleetLine(inc.fac, inc.ships);
    else if (classes) detail = 'classes inbound: ' + CLS.filter(c => (inc.ships[c] || 0) > 0).join(', ');
    else detail = 'composition unknown — research Signals or request a cluster scan';
    // the defenders standing with us
    const wings = (inc.aid || []).concat((inc.guests || []).map(g => ({ name: (S.players && (S.players.find(p => p.slot === g.owner) || {}).planet) || 'an ally', fac: g.fac, ships: g.ships, owner: g.owner })));
    // strength read (only meaningful if we can see the raiders)
    let read = '';
    if (exact || classes){
      const raiderVal = fleetValue(inc.fac, inc.ships);
      let defVal = evading ? 0 : fleetValue(S.faction, S.ships);
      defVal += lvl(S, 'bastion') * shipValue(S.faction, 'capital');
      for (const w of wings) defVal += fleetValue(w.fac, w.ships);
      const ratio = defVal / Math.max(1, raiderVal);
      read = '<div class="mt"><b>Strength read:</b> defenders ' + fmt(defVal) + ' vs raiders ' + fmt(raiderVal) + ' — ' +
        (ratio >= 1.15 ? '<span class="cyan">you are favoured</span>' :
         ratio >= 0.8 ? '<span class="amber">a close fight</span>' :
         '<span class="red">you are outgunned — consider evading</span>') + '</div>';
    }
    return '<div class="panel" style="border-color:var(--rd);box-shadow:0 0 24px rgba(255,64,85,.25);margin-bottom:14px">' +
      '<h2 style="color:var(--rd)">⚠ INCOMING' + (evading ? ' — FLEET EVADING' : '') + '</h2>' +
      '<div class="big red">' + inc.count + ' hostile ships — ETA ' + inc.left + ' tick' + (inc.left !== 1 ? 's' : '') + '</div>' +
      '<div class="muted mt">' + (inc.srcId !== undefined && S.ai[inc.srcId] ? coordChip(coordOf(S.ai[inc.srcId])) + alliChip(S.ai[inc.srcId].alli) : '') + inc.name + '</div>' +
      '<div class="mt"><b class="red">Raiders:</b> ' + detail + '</div>' +
      (wings.length ? '<div class="mt"><b class="cyan">Standing with you:</b></div>' +
        wings.map(w => { const cs = (w.aiId != null && S.ai[w.aiId]) ? coordOf(S.ai[w.aiId]) : (w.owner != null ? coordStr(0, w.owner) : null);
          const wa = (w.aiId != null && S.ai[w.aiId]) ? S.ai[w.aiId].alli : (w.owner != null && S.players ? (S.players.find(p => p.slot === w.owner) || {}).alliance : null);
          return '<div class="ev"><span class="tk">' + (cs ? coordChip(cs) : '') + alliChip(wa) + w.name + '</span><span class="tx">' + fleetLine(w.fac, w.ships) + '</span></div>'; }).join('')
        : '<div class="muted mt">No allies have committed to this defense.</div>') +
      '<div class="muted mt">Your home fleet: ' + (evading ? '<span class="amber">evading — away from home</span>' : fleetLine(S.faction, S.ships)) +
      (lvl(S, 'bastion') ? ' · ' + lvl(S, 'bastion') + ' Orbital Bastion(s)' : '') + '</div>' +
      read +
      '<div class="row mt" style="flex-wrap:wrap;gap:8px">' +
      '<button class="act amber" data-reqscan="1" ' + (S.scanReqCd > 0 || (exact) || S.res.crystal < 1000 || S.roundOver ? 'disabled' : '') + '>' +
        (S.scanReqCd > 0 ? 'scouts compiling (' + S.scanReqCd + 't)' : exact ? 'full read already' : '🛰 request cluster scan · 1000 CR') + '</button>' +
      '<button class="act amber" data-muster="1" ' + ((S.musterCd > 0) || S.alliance == null || S.roundOver ? 'disabled' : '') + '>' +
        (S.alliance == null ? 'pledge an alliance to muster' : (S.musterCd > 0) ? 'alliance regrouping (' + S.musterCd + 't)' : '⚑ MUSTER THE ALLIANCE') + '</button>' +
      (evading
        ? '<button class="act" data-recallevade="1">recall fleet from evasion</button>'
        : '<button class="act warn" data-evade="1" ' + (S.roundOver ? 'disabled' : '') + '>⤢ EVADE — scatter the fleet (raiders loot, your ships survive)</button>') +
      '</div></div>';
  }).join('');
}
function arrivalHint(){
  const eta = defEta(S), spare = S.distress.left - eta;
  if (spare > 0) return '<span class="cyan">✓ in-cluster hop, ETA ' + eta + 't — arrives with ' + spare + ' tick' + (spare !== 1 ? 's' : '') + ' to spare</span>';
  if (spare === 0) return '<span class="cyan">✓ in-cluster hop, ETA ' + eta + 't — arrives exactly in time</span>';
  return '<span class="red">✗ ETA ' + eta + 't — would arrive ' + (-spare) + ' tick' + (spare !== -1 ? 's' : '') + ' too late (+4 relations only)</span>';
}
function distressBanner(){
  if (!S.distress) return '';
  const m = S.ai[S.distress.mate];
  return '<div class="panel" style="border-color:var(--am);box-shadow:0 0 20px rgba(255,181,62,.2);margin-bottom:14px">' +
    '<h2 style="color:var(--am)">⚠ CLUSTER DISTRESS</h2>' +
    '<div class="big amber">' + m.name + ' is under attack — ' + S.distress.left + ' tick' + (S.distress.left !== 1 ? 's' : '') + ' to respond</div>' +
    '<div class="muted mt">' + (S.distress.count ? S.distress.count + ' raiders from ' + S.distress.srcName + ' inbound. ' : '') + 'Get a wing there before impact to fight at their side (+12 relations).</div>' +
    '<button class="act amber mt" data-escort="1" ' + (S.missions.length >= 3 ? 'disabled' : '') + '>' +
    'DISPATCH ESCORT — 30% of home fleet · ETA ' + defEta(S) + ' ticks</button>' +
    '<div class="mt" style="font-size:12px">' + arrivalHint() + '</div></div>';
}
function joinableRallies(){
  return (S.rallies || []).filter(r => r.phase === 'gather' && r.host !== MYSLOT);
}
function rallyBanner(){
  const rls = joinableRallies();
  if (!rls.length) return '';
  return rls.map(r => {
    const mine = r.contributions.find(c => c.slot === MYSLOT);
    const total = r.contributions.reduce((x, c) => x + c.ships, 0) +
      (r.aiWings || []).reduce((x, w) => x + CLS.reduce((y, c) => y + ((w.fleet && w.fleet[c]) || 0), 0), 0);
    return '<div class="panel" style="border-color:var(--am);box-shadow:0 0 20px rgba(255,181,62,.2);margin-bottom:14px">' +
      '<h2 style="color:var(--am)">\u2691 RALLY FORMING</h2>' +
      '<div class="big amber">' + r.hostPlanet + ' is rallying against ' + r.targetName +
      ' \u2014 departs in ' + r.left + ' tick' + (r.left !== 1 ? 's' : '') + '</div>' +
      '<div class="muted mt">' + total + ' ships committed' + (mine ? ' (your ' + mine.ships + ' included)' : '') + '. ' +
      (mine ? 'You are in \u2014 adjust on the Fleets screen.' : 'Pile in from the Fleets screen before it departs.') + '</div>' +
      '<button class="act amber mt" data-nav="fleets">' + (mine ? 'view on Fleets' : 'JOIN \u2014 open Fleets') + '</button></div>';
  }).join('');
}
function rallyChip(){
  const rls = joinableRallies();
  if (!rls.length) return '';
  const soonest = Math.min.apply(null, rls.map(r => r.left));
  return '<span class="amber" data-goto="fleets" style="font-weight:700;cursor:pointer;text-decoration:underline dotted;text-underline-offset:3px" ' +
    'title="a cluster-mate is rallying \u2014 open Fleets to join">\u2691 rally forming' +
    (rls.length > 1 ? ' \u00d7' + rls.length : '') + ' (' + soonest + 't)</span>';
}
function rOverview(){
  let h = incomingBanner() + distressBanner() + rallyBanner();
  if (S.roundOver){
    const rk = playerRank(S);
    const medals = [];
    if (rk === 1) medals.push('🏆 EMPEROR OF THE SPHERE — #1 of ' + (GAL_COUNT * GAL_SIZE));
    else if (rk <= 10) medals.push('🥇 Top 10 — #' + rk + ' of ' + (GAL_COUNT * GAL_SIZE));
    else if (rk <= 50) medals.push('🥈 Top 50 — #' + rk + ' of ' + (GAL_COUNT * GAL_SIZE));
    else medals.push('Final rank: #' + rk + ' of ' + (GAL_COUNT * GAL_SIZE));
    if (S.stats.shipsStolen >= 25) medals.push('🪶 Master Thief — ' + S.stats.shipsStolen + ' ships stolen');
    if (S.stats.repelled >= 10) medals.push('🛡 Iron Turtle — ' + S.stats.repelled + ' raids repelled');
    if (S.stats.roidsStolen >= 60) medals.push('☄ Roid Baron — ' + S.stats.roidsStolen + ' roids taken');
    if (S.stats.escorts >= 5) medals.push('🤝 Shield of the Cluster — ' + S.stats.escorts + ' rescues');
    const wb = (S.winningBloc != null) ? S.winningBloc : (typeof blocWinner === 'function' && !S.blocs ? blocWinner(S) : null);
    h += '<div class="panel" style="border-color:var(--am)"><h2 style="color:var(--am)">Round complete</h2>' +
      (wb != null ? '<div class="big" style="color:' + ALLIANCES[wb].color + '">🏆 ' + ALLIANCES[wb].name + ' holds the sphere</div>' +
        '<div class="' + (S.alliance === wb ? 'cyan' : 'muted') + ' mt">' +
        (S.alliance === wb ? 'You fought under the winning banner — victory is yours and your alliance\'s.' :
         S.alliance != null ? 'Your alliance, ' + ALLIANCES[S.alliance].name + ', fell short this round.' :
         'You stood unaligned — no share of the team victory.') + '</div>' : '') +
      '<div class="big amber mt">' + fmt(score(S)) + ' points</div>' +
      '<div class="mt">' + medals.map(m2 => '<div>' + m2 + '</div>').join('') + '</div>' +
      '<div class="mt"><b>Battle record:</b> ' + (S.stats.battles || 0) + ' battle' + ((S.stats.battles || 0) !== 1 ? 's' : '') + ' fought · ' +
      '<span class="cyan">' + fmt(S.stats.shipsKilled || 0) + '</span> enemy ships destroyed · ' +
      '<span class="red">' + fmt(S.stats.shipsLost || 0) + '</span> of ours lost' +
      ((S.stats.shipsStolen || 0) ? ' · <span class="amber">' + fmt(S.stats.shipsStolen) + '</span> captured by Magpies' : '') + '</div>' +
      '<div class="muted mt">' + (S.roids.ore + S.roids.crystal + S.roids.flux) + ' asteroids · ' +
      fmt(S.spent.research) + ' RP spent · start a new round from Settings.</div></div><div class="mt"></div>';
  }
  // resources
  h += '<div class="grid g3">' + ['ore','crystal','flux'].map(t =>
    '<div class="panel rescard"><h2 style="display:flex;align-items:center;gap:6px">' + resIcon(t, 22, { glow: true }) + t + '</h2>' +
    '<div class="roidn">' + S.roids[t] + ' roids</div>' +
    '<div class="big odo" data-odo="' + Math.floor(S.res[t]) + '">' + fmt(S.res[t]) + '</div>' +
    '<div class="delta">+' + fmt(incomePerTick(S, t)) + ' / tick</div></div>'
  ).join('') + '</div>';
  // activity row
  const bq = S.buildQueue[0];
  const rb = S.research.branch;
  h += '<div class="grid g3 mt">';
  h += '<div class="panel"><h2>Construction</h2>';
  if (bq){
    h += '<div class="ringwrap">' + structIcon(bq.key, 52, { glow: true }) + ring(1 - bq.left / bq.total, 64) +
      '<div><b>' + BUILDINGS[bq.key].name + '</b> → L' + (lvl(S, bq.key) + 1) +
      '<div class="muted">' + bq.left + ' tick' + (bq.left > 1 ? 's' : '') + ' remaining</div></div></div>';
    if (S.buildQueue[1]) h += '<div class="muted mt" style="display:flex;align-items:center;gap:5px">queued: ' + structIcon(S.buildQueue[1].key, 18) + ' ' + BUILDINGS[S.buildQueue[1].key].name + '</div>';
  } else h += '<div class="muted">Idle — the Structures bay awaits orders.</div>';
  h += '</div>';
  h += '<div class="panel"><h2>Research</h2>';
  if (rb){
    const rung = RESEARCH[rb].rungs[S.research.done[rb]];
    const eta = Math.ceil((rung.c - S.research.progress) / rpPerTick(S));
    h += '<div class="ringwrap">' + ring(S.research.progress / rung.c, 64, 'amber') +
      '<div><b>' + rung.n + '</b><div class="muted">' + RESEARCH[rb].name + ' · ~' + eta + ' ticks</div></div></div>';
  } else h += '<div class="muted">No project. ' + rpPerTick(S) + ' RP/tick standing by.</div>';
  h += '</div>';
  // roid initiation
  h += '<div class="panel"><h2>Asteroid initiation</h2>';
  if (S.roidQueue.length){
    h += '<div class="muted">mining: ' + S.roidQueue.map(q => q.type + ' (' + q.left + 't)').join(', ') + '</div>';
  }
  h += '<div class="row mt">' + ['ore','crystal','flux'].map(t => {
    const rc = roidCost(S, t);
    const short = S.res.ore < rc;
    const inT = short ? Math.ceil((rc - S.res.ore) / Math.max(1, incomePerTick(S, 'ore'))) : 0;
    return '<button class="act amber" data-roid="' + t + '" ' +
      (short || S.roidQueue.length >= 5 || S.roundOver ? 'disabled' : '') + '>+' + t +
      '<br><span class="muted">' + fmt(rc) + ' ore' + (short ? ' · in ~' + inT + 't' : '') + '</span></button>';
  }).join('') + '</div></div>';
  h += '</div>';
  // fleet summary
  const hv = fleetValue(S.faction, S.ships);
  h += '<div class="grid g2 mt">';
  h += '<div class="panel"><h2>Home fleet</h2>' +
    (hv > 0 || S.missions.length ?
      '<div class="muted" style="display:flex;flex-wrap:wrap;gap:4px 10px;align-items:center">' + CLS.filter(c => S.ships[c] > 0).map(c =>
        '<span style="white-space:nowrap">' + shipIcon(c, 16, S.faction) + ' ' + S.ships[c] + '× ' + shipName(S.faction, c) + '</span>').join('') +
      (CLS.every(c => !S.ships[c]) ? 'all ships deployed' : '') + '</div>' +
      '<div class="mt">value <b class="cyan">' + fmt(hv) + '</b>' +
      (lvl(S, 'bastion') ? ' · <span class="muted">' + lvl(S, 'bastion') + ' Orbital Bastion(s)</span>' : '') + '</div>'
      : '<div class="muted">No ships yet — the Shipyard (Structures) unlocks Production.</div>') +
    '</div>';
  const myRallies = (S.rallies || []).filter(r => r.contributions && r.contributions.some(c => c.slot === MYSLOT));
  const mLines = S.missions.map(m =>
    '<div class="muted">' + (m.phase === 'out'
      ? (m.kind === 'defend' ? '→ escorting ' : m.kind === 'reinforce' ? '→ reinforcing ' : '→ attacking ')
      : '← returning from ') + S.ai[m.target].name + ' · ' + m.left + 't</div>').join('');
  const rLines = myRallies.map(r =>
    '<div class="muted">' + (r.phase === 'gather' ? '⚑ rallying against ' : '→ joint raid en route to ') +
    r.targetName + ' · ' + r.left + 't</div>').join('');
  h += '<div class="panel"><h2>Missions</h2>' +
    ((S.missions.length || myRallies.length) ? mLines + rLines : '<div class="muted">No fleets in flight.</div>') +
    '</div>';
  h += '</div>';
  // round + events
  h += '<div class="panel mt"><h2>Round progress</h2>' +
    '<div class="roundbar"><i style="width:' + (100 * S.tick / (S.roundTicks || ROUND_TICKS)).toFixed(2) + '%"></i></div>' +
    '<div class="muted mt">tick ' + S.tick + ' of ' + (S.roundTicks || ROUND_TICKS) + ' — ' +
    (S.tickMode === 'authentic' ? 'one tick per hour, on the hour' :
     S.tickMode === 'fast' ? 'fast mode: one tick per minute' : 'manual ticks') + '</div>' +
    (S.tick < (S.protectUntil || 72) ?
      '<div class="amber mt">🛡 raid protection: <b>' + ((S.protectUntil || 72) - S.tick) + ' tick' + ((S.protectUntil || 72) - S.tick !== 1 ? 's' : '') +
      '</b> remaining (ends at tick ' + (S.protectUntil || 72) +
      (S.tickMode === 'authentic' ? ' — about ' + Math.round(((S.protectUntil || 72) - S.tick) / 24 * 10) / 10 + ' days' : '') +
      '). Build your economy and a corvette guard before it lifts.</div>'
      : '') + '</div>';
  const ev = S.events.slice(-8).reverse();
  h += '<div class="panel mt"><h2>Recent events</h2>' +
    (ev.length ? ev.map(evHtml).join('') : '<div class="muted">Nothing yet. The universe is young.</div>') + '</div>';
  return h;

function rComms(){

    [['chat', '💬 Channels'], ['log', '📰 News & reports']].map(function(t){
      const u = t[0] === 'chat' ? totalUnread() : 0;

  h += '<div class="panel" style="margin-bottom:14px"><h2>Universe news</h2>' +
    (S.news.length ? S.news.slice(-15).reverse().map(nn =>

    h += '<h2 style="font-size:12px;letter-spacing:2.5px;color:var(--cy);margin-bottom:10px">BATTLE REPORTS</h2>' +
      S.reports.slice().reverse().map((r, i) => reportHtml(r, S.reports.length - 1 - i)).join('');

  const ev = S.events.slice().reverse();

}

function costPreview(c){
  const n = Math.max(0, Math.floor(prodDraft[c] || 0));
  if (!n) return '&nbsp;';
  const cc = shipCost(S, c);
  const names = ['ore', 'crystal', 'flux'], tags = ['OR', 'CR', 'FL'];
  let affordable = true;
  const parts = cc.map((x, i) => {
    const tot = x * n;
    const ok = S.res[names[i]] >= tot;
    if (!ok) affordable = false;
    return '<b class="' + (ok ? '' : 'no') + '">' + fmt(tot) + '</b> ' + tags[i];
  }).join(' · ');
  const ticks = Math.ceil(n * SHIPS[c].prod / prodRate(S));
  return n + '× total: ' + parts + ' · ~' + ticks + ' tick' + (ticks !== 1 ? 's' : '') +
    (affordable ? '' : affordHint(S, cc.map(x => x * n)));
}

/* Monte-Carlo battle predictor — runs the real battleW many times to sample the distribution */
function predictBattle(attWings, defWings, bastion, samples){
  samples = samples || 160;
  let wins = 0; const loss = [], harv = [];
  const a0 = attWings.reduce((s, w) => s + fleetValue(w.fac, w.ships), 0);
  for (let i = 0; i < samples; i++){
    const A = attWings.map(w => ({ fac: w.fac, ships: { ...w.ships }, steal: w.steal || 0, bureau: w.bureau || 0 }));
    const D = defWings.map(w => ({ fac: w.fac, ships: { ...w.ships }, steal: 0, bureau: w.bureau || 0 }));
    const r = battleW(A, D, bastion || 0, {});
    if (r.win) wins++;
    loss.push(a0 - r.A.reduce((s, w) => s + fleetValue(w.fac, w.cur), 0));
    harv.push(r.A[0].cur.harvester || 0);
  }
  loss.sort((x, y) => x - y); harv.sort((x, y) => x - y);
  const q = (arr, p) => arr[Math.min(arr.length - 1, Math.floor(p * arr.length))];
  return { win: Math.round(100 * wins / samples), lossLo: Math.max(0, Math.round(q(loss, 0.1))),
           lossHi: Math.max(0, Math.round(q(loss, 0.9))), harvLo: q(harv, 0.1), harvHi: q(harv, 0.9) };
}
function calcVerdict(pr){
  const c = pr.win >= 75 ? 'cyan' : pr.win >= 45 ? 'amber' : 'red';
  return '<span class="' + c + '"><b>' + pr.win + '% win</b></span> · expect to lose ~' + fmt(pr.lossLo) + '–' + fmt(pr.lossHi) +
    ' fleet value' + (pr.harvHi > 0 ? ' · ' + pr.harvLo + '–' + pr.harvHi + ' harvesters survive' : '');
}
/* composition matchup: a class HARD-COUNTERS another if it targets it and isn't targeted back.
   Surfaces *why* the win% is what it is — the decisive counters, not just the number. */
function hardCounters(aShips, aFac, dShips, dFac){
  const out = [];
  for (const c of CLS){
    if (!(aShips[c] > 0) || !SHIPS[c].dmg) continue;
    for (const t of SHIPS[c].tgt){
      if (dShips[t] > 0 && SHIPS[t].dmg >= 0 && SHIPS[t].tgt.indexOf(c) < 0)
        out.push(shipName(aFac, c) + ' \u25b8 ' + shipName(dFac, t));
    }
  }
  return out;
}
function matchupLine(aShips, aFac, dShips, dFac){
  const yours = hardCounters(aShips, aFac, dShips, dFac);     // your hulls that hard-counter theirs
  const theirs = hardCounters(dShips, dFac, aShips, aFac);    // their hulls that hard-counter yours
  if (!yours.length && !theirs.length) return '<div class="muted" style="font-size:11px">Matchup: evenly composed — no hard counters either way.</div>';
  return '<div style="font-size:11px;margin-top:2px">' +
    (yours.length ? '<span class="cyan">\u2713 you counter: ' + yours.join(', ') + '</span>' : '') +
    (yours.length && theirs.length ? '<br>' : '') +
    (theirs.length ? '<span class="red">\u26a0 they counter: ' + theirs.join(', ') + '</span>' : '') + '</div>';
}
/* final-approach recon panel — shown one tick before an attack lands, with retreat */
function reconPanel(){
  const recs = S.missions.map((m, i) => ({ m, i })).filter(x => x.m.phase === 'out' && x.m.recon);
  if (!recs.length) return '';
  return recs.map(({ m, i }) => {
    const p = S.ai[m.target], rec = m.recon;
