let UPOS = [];
function galPos(g, w, h2){
  if (g === 0) return { x: w / 2, y: h2 / 2 };
  const ang = g * 2.39996, rad = (Math.min(w, h2) * 0.46) * Math.sqrt(g / 24);
  return { x: w / 2 + Math.cos(ang) * rad * (w / h2 > 1.6 ? 1.5 : 1), y: h2 / 2 + Math.sin(ang) * rad };
}
function galColor(g){
  const ps = S.ai.filter(p => p.gal === g);
  const counts = [0, 0, 0, 0];
  for (const p of ps) if (p.alli >= 0) counts[p.alli]++;
  const m = Math.max(...counts);
  return m > 0 ? ALLIANCES[counts.indexOf(m)].color : '#7e96a8';
}
function qpoint(p0, p1, cpx, cpy, u){
  const a = 1 - u;
  return { x: a * a * p0.x + 2 * a * u * cpx + u * u * p1.x,
           y: a * a * p0.y + 2 * a * u * cpy + u * u * p1.y };
}
function drawUMap(t){
  const c = document.getElementById('umap');
  if (!c || !S) return;
  if (c.width !== c.clientWidth || c.height !== c.clientHeight){
    c.width = c.clientWidth; c.height = c.clientHeight;
  }
  const g = c.getContext('2d'), w = c.width, h2 = c.height;
  g.clearRect(0, 0, w, h2);
  // faint local stars
  for (let i = 0; i < 50; i++){
    g.fillStyle = 'rgba(220,236,245,' + (0.1 + ((i * 37) % 10) / 40) + ')';
    g.fillRect((i * 167) % w, (i * 97) % h2, 1, 1);
  }
  UPOS = [];
  const arcs = [];
  const home = galPos(0, w, h2);
  // missions out/back
  for (const m of S.missions){
    const tg = galPos(S.ai[m.target].gal, w, h2);
    const u = Math.max(0, Math.min(1, (m.total - m.left) / m.total));
    arcs.push({ from: m.phase === 'out' ? home : tg, to: m.phase === 'out' ? tg : home,
                u, color: m.kind === 'defend' ? '#ffb53e' : '#19e3ff', label: m.left + 't' });
  }
  // incoming raids
  for (const inc of S.incoming){
    const src = inc.srcId !== undefined ? galPos(S.ai[inc.srcId].gal, w, h2) : galPos(12, w, h2);
    arcs.push({ from: src, to: home, u: Math.max(0, Math.min(1, (inc.total - inc.left) / inc.total)),
                color: '#ff4055', label: 'ETA ' + inc.left });
  }
  // joint rallies I'm part of, in flight
  for (const r of (S.rallies || [])){
    if (r.phase !== 'out' || !r.contributions || !r.contributions.some(c => c.slot === MYSLOT)) continue;
    const tg = galPos(S.ai[r.target].gal, w, h2);
    arcs.push({ from: home, to: tg, u: Math.max(0, Math.min(1, (r.total - r.left) / r.total)),
                color: '#b88ae8', label: 'rally ' + r.left + 't' });
  }
  for (const a of arcs){
    const mx = (a.from.x + a.to.x) / 2, my = (a.from.y + a.to.y) / 2;
    const dx = a.to.x - a.from.x, dy = a.to.y - a.from.y;
    const len = Math.max(1, Math.hypot(dx, dy));
    const cpx = mx - dy / len * 46, cpy = my + dx / len * 46;
    g.strokeStyle = a.color; g.lineWidth = 1.6;
    g.setLineDash([5, 9]);
    g.lineDashOffset = -(t * 0.03);
    g.shadowColor = a.color; g.shadowBlur = 6;
    g.beginPath(); g.moveTo(a.from.x, a.from.y);
    g.quadraticCurveTo(cpx, cpy, a.to.x, a.to.y);
    g.stroke();
    g.setLineDash([]);
    const pt = qpoint(a.from, a.to, cpx, cpy, a.u);
    g.fillStyle = a.color;
    g.beginPath(); g.arc(pt.x, pt.y, 3.4, 0, 7); g.fill();
    g.shadowBlur = 0;
    g.font = '10px monospace';
    g.fillText(a.label, pt.x + 7, pt.y - 5);
  }
  // galaxy nodes
  for (let gi = 0; gi < GAL_COUNT; gi++){
    const p = galPos(gi, w, h2);
    UPOS.push({ g: gi, x: p.x, y: p.y });
    const col = gi === 0 ? '#19e3ff' : galColor(gi);
    const known = gi === 0 || S.known.some(id => S.ai[id] && S.ai[id].gal === gi);
    g.globalAlpha = known ? 1 : 0.26;   // fog of war: uncharted clusters are dim
    const angry = known && S.ai.some(q => q.gal === gi && q.heat > 2);
    if (angry){
      g.strokeStyle = 'rgba(255,64,85,' + (0.4 + 0.3 * Math.sin(t * 0.005)) + ')';
      g.lineWidth = 2;
      g.beginPath(); g.arc(p.x, p.y, 12 + Math.sin(t * 0.005) * 2, 0, 7); g.stroke();
    }
    g.shadowColor = col; g.shadowBlur = gi === uniSel ? 16 : 8;
    g.fillStyle = col;
    g.beginPath(); g.arc(p.x, p.y, gi === 0 ? 6 : 4.4, 0, 7); g.fill();
    g.shadowBlur = 0;
    if (gi === uniSel){
      g.strokeStyle = '#ffd23e'; g.lineWidth = 1.6;
      g.beginPath(); g.arc(p.x, p.y, 9, 0, 7); g.stroke();
    }
    g.fillStyle = gi === 0 ? '#bff2ff' : 'rgba(220,236,245,.75)';
    g.font = (gi === 0 ? 'bold ' : '') + '10px monospace';
    g.fillText((gi === 0 ? '★' : '') + (S.clusterLabels ? S.clusterLabels[gi] : (gi + 1)), p.x + 9, p.y + 3);
    g.globalAlpha = 1;
  }
}

    ).join('') + '</div>';

    n: a.name, c: a.color, sc: S.ai.filter(p => p.alli === i).reduce((x, p) => x + aiScore(p), 0)
  })).sort((a, b) => b.sc - a.sc);

    '<div class="ev"><span class="tk">#' + (i + 1) + '</span><span class="tx" style="color:' + a.c + '">' + a.n +
    '</span><span style="margin-left:auto">' + fmt(a.sc) + '</span></div>'

}
function drawScoreGraph(){
  const c = document.getElementById('sgraph');
  if (!c || !S || S.scoreHist.length < 2) return;
  c.width = c.clientWidth; c.height = c.clientHeight;
  const g = c.getContext('2d'), w = c.width, h2 = c.height;
  const hist = S.scoreHist;
  const maxS = Math.max(...hist.map(p => p[1]), 1);
  const minT = hist[0][0], maxT = Math.max(hist[hist.length - 1][0], minT + 1);
  const px2 = t => 8 + (w - 16) * (t - minT) / (maxT - minT);
  const py2 = sc => h2 - 10 - (h2 - 24) * sc / maxS;
  const y2k = document.body.classList.contains('y2k');
  // grid
  g.strokeStyle = y2k ? '#2c3e4e' : 'rgba(255,255,255,.07)';
  g.lineWidth = 1;
  for (let i = 1; i < 4; i++){
    g.beginPath(); g.moveTo(8, h2 * i / 4); g.lineTo(w - 8, h2 * i / 4); g.stroke();
  }
  // area fill
  const grad = g.createLinearGradient(0, 0, 0, h2);
  grad.addColorStop(0, y2k ? 'rgba(5,141,183,.3)' : 'rgba(25,227,255,.25)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  g.fillStyle = grad;
  g.beginPath();
  g.moveTo(px2(hist[0][0]), h2 - 10);
  for (const p of hist) g.lineTo(px2(p[0]), py2(p[1]));
  g.lineTo(px2(hist[hist.length - 1][0]), h2 - 10);
  g.closePath(); g.fill();
  // line
  g.strokeStyle = y2k ? '#36c6f0' : '#19e3ff';
  g.lineWidth = 2;
  if (!y2k){ g.shadowColor = '#19e3ff'; g.shadowBlur = 6; }
  g.beginPath();
  hist.forEach((p, i) => i ? g.lineTo(px2(p[0]), py2(p[1])) : g.moveTo(px2(p[0]), py2(p[1])));
  g.stroke();
  g.shadowBlur = 0;
  g.fillStyle = y2k ? '#8fa9bd' : 'rgba(126,150,168,.9)';
  g.font = '10px monospace';
  g.fillText(fmt(maxS), 10, 12);
  g.fillText('tick ' + minT + ' → ' + maxT, w - 110, h2 - 2);
}

let pollBusy = false;
async function pollOnce(){
  if (!TOKEN || !GAME || !S || pollBusy) return;
  pollBusy = true;
  try { await refresh(); } catch(e){}
  pollBusy = false;
}
/* live push via Server-Sent Events — instant updates on tick & others' actions.
   The 20s poll is just a safety net if the stream drops. */
let evtSrc = null, evtGame = 0;
function ensureStream(){
  if (!TOKEN || !GAME){ if (evtSrc){ evtSrc.close(); evtSrc = null; evtGame = 0; } return; }
  if (evtSrc && evtGame === GAME) return;
  if (evtSrc){ evtSrc.close(); evtSrc = null; }
  evtGame = GAME;
  try {
    evtSrc = new EventSource('/api/games/' + GAME + '/stream?token=' + encodeURIComponent(TOKEN));
    evtSrc.onmessage = () => pollOnce();   // a push just means "something changed — refresh"
    evtSrc.onerror = () => {};             // EventSource auto-reconnects with the server's retry hint
  } catch(e){ evtSrc = null; }
}
setInterval(ensureStream, 2000);
setInterval(pollOnce, 20000);

/* ---- starfield ---- */
(function(){
  const c = document.getElementById('stars'), g = c.getContext('2d');
  let stars = [];
  function size(){
    c.width = innerWidth; c.height = innerHeight;
    stars = [];
    for (let i = 0; i < 160; i++)
      stars.push({ x: Math.random() * c.width, y: Math.random() * c.height,
                   z: 0.2 + Math.random() * 0.8, tw: Math.random() * 6.28 });
  }
  addEventListener('resize', size); size();
  function frame(t){
    // odometer roll for the big resource numbers
    document.querySelectorAll('.odo').forEach(el => {
      const tgt = +el.dataset.odo;
      let v = (el._v === undefined) ? tgt : el._v;
      v += (tgt - v) * 0.18;
      if (Math.abs(tgt - v) < 1) v = tgt;
      el._v = v;
      el.textContent = fmt(v);
    });
    // the universe map redraws every frame while visible
    drawUMap(t);
    g.fillStyle = document.body.classList.contains('y2k') ? '#161d25' : '#04070e';
    g.fillRect(0, 0, c.width, c.height);
    // nebulae
    const n1 = g.createRadialGradient(c.width * 0.78, c.height * 0.22, 0, c.width * 0.78, c.height * 0.22, 360);
    n1.addColorStop(0, 'rgba(25,90,140,0.12)'); n1.addColorStop(1, 'rgba(0,0,0,0)');
    g.fillStyle = n1; g.fillRect(0, 0, c.width, c.height);
    const n2 = g.createRadialGradient(c.width * 0.16, c.height * 0.8, 0, c.width * 0.16, c.height * 0.8, 300);
    n2.addColorStop(0, 'rgba(120,50,140,0.08)'); n2.addColorStop(1, 'rgba(0,0,0,0)');
    g.fillStyle = n2; g.fillRect(0, 0, c.width, c.height);
    for (const s2 of stars){
      s2.x -= s2.z * 0.04;
      if (s2.x < 0) s2.x = c.width;
      const a = 0.35 + 0.45 * Math.abs(Math.sin(t * 0.0004 + s2.tw)) * s2.z;
      g.fillStyle = 'rgba(220,236,245,' + a.toFixed(2) + ')';
      g.fillRect(s2.x, s2.y, s2.z > 0.75 ? 2 : 1, s2.z > 0.75 ? 2 : 1);
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
